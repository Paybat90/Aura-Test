    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Chart.js -->

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        forge: {
                            900: '#1a1814',
                            800: '#2a2620',
                            700: '#3c362d',
                            accent: '#d97706',
                            light: '#fde68a'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #1a1814; color: #e5e7eb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color-scheme: dark; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #2a2620; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #52525b; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d97706; }
        
        /* KI Glühen */
        .glow-ai { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .glow-ai-openai { box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); }
        
        /* Verbesserte Pfeile */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button {  
           opacity: 1; cursor: pointer; height: 28px; margin-left: 2px;
        }
        .spin-styled-blue::-webkit-inner-spin-button { filter: sepia(100%) hue-rotate(190deg) saturate(300%) brightness(0.9); }
        .spin-styled-amber::-webkit-inner-spin-button { filter: sepia(100%) hue-rotate(340deg) saturate(300%) brightness(0.8); }
        
        /* Mobile Touch Optimierungen */
        input, select, button, textarea { touch-action: manipulation; }

        /* Smooth Dragging Effect für Spalten Sortierung */
        th.dragging { opacity: 0.5; }
        th.drag-over { background-color: rgba(60, 54, 45, 0.8) !important; }

        /* Resizer Handle für Spaltenbreiten */
        .col-resizer {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            cursor: col-resize;
            background-color: transparent;
            z-index: 10;
        }
        .col-resizer:hover, .col-resizer:active {
            background-color: #d97706;
        }
        
        /* Clickable Charts */
        canvas { cursor: pointer; }
    </style>
</head>

        const DEFAULT_AI_PROMPT = `Als D&D 5e Game Designer und Datenbank-Manager, bewerte die Item-Bausteine aus unserem Loot-Generator und prüfe ALLE Eingaben strikt nach unseren Regeln.

WICHTIGER KONTEXT: 
Wir bauen ein MODULARES Schmiede-System. Du bewertest EIGENSCHAFTEN (Präfixe, Suffixe, Merkmale), die auf normale Basis-Waffen oder Basis-Rüstungen geschmiedet werden. Keine eigenständigen magischen Gegenstände! 

UNSERE REGELN:
1. PC-Werte: 0-1 (Utility), 2-3 (Taktik, 1w4 Boni), 4-5 (Starke Boni +1/+2), 6+ (Game-Changer). Negative PC (-1 bis -3) für Flüche.
2. Guardrails: Flache Boni (+1, +2 RK/Angriff) erfordern PC 4+. Ausnahme: Flache Schadensboni oder Angriffs-Mali sind bei echten Trade-Offs/Flüchen erlaubt. Für PC 2-3 nutze ansonsten immer reaktive Würfel (z.B. 1w4).
3. Einstimmung (Attunement): ZWINGEND "true" bei PC 4+, wenn Zauber gewirkt werden, Attribute steigen oder Klassenvoraussetzungen existieren. Ansonsten "false" oder spezifisch wie "class_paladin". Schreibe das immer als Array (z.B. ["class_paladin"]).
4. Trade-offs: Bonus UND klarer Malus = "Trade-off" Ja.
5. Tag-System: Motivatoren (kampf, taktik, teamplay, rollenspiel, risiko). Thematik (physisch, magie, feuer, eis, natur, licht, schatten, nekrotisch, gift, wasser, erwachend, etc.).

DEINE AUFGABE - Erstelle eine strukturierte Analyse in diesen Kategorien:
- "Mechanik": Passt das PC-Level? Guardrails verletzt? Vorschläge?
- "Logik": Prüfe Trade-off, Einstimmung und Goldwert.
- "Tags": Fehlende Motivator/Thema-Tags ergänzen.
- "Physische_Logik": STRENG! Nenne Basis-Waffen/Rüstungen (PHB 2024), für die der Effekt unlogisch wäre. Korrigiere den Typ auf exakte PHB-Gruppen.
- "Klasse & Volk": Beurteile oder korrigiere Zuweisungen.

Antworte IMMER als reines JSON-Objekt mit EXAKT dieser Struktur. Du erhältst ein oder mehrere Items zur Prüfung. Speichere das Ergebnis für JEDES Item unter seiner ID in das "ergebnisse"-Objekt:
{
  "ergebnisse": {
    "item_id_xyz": {
      "gedankengang": "Denke hier Schritt für Schritt nach...",
      "bewertungen": [
        {
          "kategorie": "Mechanik & Balancing",
          "status": "ok", // Nur "ok" oder "abweichung"
          "text": "Zusammenfassung.",
          "punkte": ["Punkt 1", "Punkt 2"]
        }
      ],
      "fazit": "Zusammenfassung und Vorschläge zum Text...",
      "name": "Neuer Name oder null",
      "desc": "Verbesserte Beschreibung oder null",
      "power_cost": 2.5,
      "wert": 1.5,
      "type": "Vorschlag Type kommagetrennt oder null",
      "subType": "Vorschlag Sub-Typ kommagetrennt oder null",
      "klasse": "Vorschlag Klasse kommagetrennt oder null",
      "volk": "Vorschlag Volk kommagetrennt oder null",
      "attunement_req": ["class_xyz"], // IMMER EIN ARRAY, z.B. [], ["true"], ["class_paladin"]
      "is_tradeoff": "true oder false oder null",
      "tags": "", 
      "tags_motivator": "...",
      "tags_zeitaufwand": "...",
      "tags_thema": "...",
      "flavour_text": "Vorschlag für Flavour Text oder null",
      "upgrade_id": "Vorschlag für Upgrade ID oder null",
      "awaken_riddle": "Vorschlag für Rätsel oder null",
      "awaken_clear": "Vorschlag für Bedingung oder null"
    }
  }
}`;

        // --- TAG DICTIONARIES & LOGIC ---
        const TAG_DICTIONARIES = {
            motivator: ['kampf', 'taktik', 'teamplay', 'rollenspiel', 'risiko'],
            thema: [
                'physisch', 'magie', 'feuer', 'eis', 'natur', 'licht', 
                'schatten', 'nekrotisch', 'gift', 'wasser', 'kraft', 'mental', 'chaos', 'erwachend'
            ],
            zeit: ['aktion', 'reaktion', 'bonusaktion', 'passiv', 'rast', 'erkundung']
        };

        const parseCsvTagsForUI = (rawCsvTags) => {
            if (!rawCsvTags) return { allgemein: '', motivator: '', zeit: '', thema: '' };

            const allTags = rawCsvTags.split(',').map(tag => tag.trim().toLowerCase());
            const sorted = { motivator: [], thema: [], zeit: [], allgemein: [] };

            allTags.forEach(tag => {
                if (tag === '') return;
                if (TAG_DICTIONARIES.motivator.includes(tag)) {
                    sorted.motivator.push(tag);
                } else if (TAG_DICTIONARIES.thema.includes(tag)) {
                    sorted.thema.push(tag);
                } else if (TAG_DICTIONARIES.zeit.includes(tag)) {
                    sorted.zeit.push(tag);
                } else {
                    sorted.allgemein.push(tag);
                }
            });

            return {
                motivator: [...new Set(sorted.motivator)].join(', '),
                thema: [...new Set(sorted.thema)].join(', '),
                zeit: [...new Set(sorted.zeit)].join(', '),
                allgemein: [...new Set(sorted.allgemein)].join(', ')
            };
        };

        // --- Hilfsfunktionen ---
        const fixUmlaute = (str) => {
            if (typeof str !== 'string') return str;
            return str
                .replace(/Ã¤/g, 'ä').replace(/Ã¶/g, 'ö').replace(/Ã¼/g, 'ü')
                .replace(/Ã„/g, 'Ä').replace(/Ã–/g, 'Ö').replace(/Ãœ/g, 'Ü')
                .replace(/ÃŸ/g, 'ß')
                .replace(/ï¿½/g, 'ß');
        };

        const normalizeStr = (str) => {
            if (!str) return 'Unbekannt';
            return String(str).trim().toLowerCase();
        };

        const capitalizeStr = (str) => {
            if (!str) return '';
            return str.charAt(0).toUpperCase() + str.slice(1);
        };

        const normalizeForMatch = (str) => {
            if (!str) return '';
            return String(str).toLowerCase().replace(/[^a-z0-9äöüß]/g, '');
        };

        const parseTags = (tagString) => {
            if (!tagString) return [];
            return String(tagString).split(',').map(t => t.trim()).filter(t => t.length > 0);
        };

        const getAllTags = (item) => {
            return [
                ...parseTags(item.tags_motivator),
                ...parseTags(item.tags_zeitaufwand),
                ...parseTags(item.tags_thema),
                ...(item.tags ? parseTags(item.tags) : []) 
            ];
        };

        const getCombinedTags = (item) => {
            return [item.tags_thema, item.tags_motivator, item.tags_zeitaufwand, item.tags]
                .map(t => (t || '').trim())
                .filter(t => t.length > 0)
                .join(', ');
        };

        const getTagColor = (tag, type = 'all') => {
            if (type === 'motivator') return 'bg-red-900/50 text-red-300 border-red-700/50';
            if (type === 'zeit') return 'bg-blue-900/50 text-blue-300 border-blue-700/50';
            if (type === 'thema') return 'bg-emerald-900/50 text-emerald-300 border-emerald-700/50';
            if (type === 'type') return 'bg-indigo-900/50 text-indigo-300 border-indigo-700/50'; 
            if (type === 'subtype') return 'bg-teal-900/50 text-teal-300 border-teal-700/50'; 
            if (type === 'klasse') return 'bg-yellow-900/50 text-yellow-300 border-yellow-700/50'; 
            if (type === 'volk') return 'bg-orange-900/50 text-orange-300 border-orange-700/50'; 
            if (type === 'all') return 'bg-gray-800 text-gray-300 border-gray-600'; 
            
            let hash = 0;
            const cleanTag = tag.toLowerCase();
            for (let i = 0; i < cleanTag.length; i++) hash = cleanTag.charCodeAt(i) + ((hash << 5) - hash);
            const colors = ['bg-purple-900/50 text-purple-300 border-purple-700/50', 'bg-amber-900/50 text-amber-300 border-amber-700/50', 'bg-cyan-900/50 text-cyan-300 border-cyan-700/50'];
            return colors[Math.abs(hash) % colors.length];
        };

        // --- Standard Spalten-Konfiguration inkl. Breiten ---
        const defaultColumns = [
            { key: 'id', label: 'ID', visible: true, width: 60 },
            { key: 'name', label: 'Name', visible: true, width: 220 },
            { key: 'category', label: 'Kategorie', visible: true, width: 120 },
            { key: 'type', label: 'Type', visible: true, width: 140 },
            { key: 'subType', label: 'Sub-Typ', visible: true, width: 160 },
            { key: 'klasse', label: 'Klasse', visible: true, width: 140 },
            { key: 'volk', label: 'Volk', visible: true, width: 140 },
            { key: 'source', label: 'Source', visible: true, width: 100 },
            { key: 'tags', label: 'Tags (Unsortiert)', visible: true, width: 160 },
            { key: 'tags_motivator', label: 'Motivator', visible: true, width: 160 },
            { key: 'tags_zeitaufwand', label: 'Zeit', visible: true, width: 160 },
            { key: 'tags_thema', label: 'Thema', visible: true, width: 160 },
            { key: 'attunement_req', label: 'Attunement', visible: true, width: 110 },
            { key: 'power_cost', label: 'P-Cost', visible: true, width: 80 },
            { key: 'wert', label: 'Wert', visible: true, width: 80 },
            { key: 'is_tradeoff', label: 'Tradeoff', visible: true, width: 80 },
            { key: 'manually_checked', label: 'Check', visible: true, width: 70 },
            { key: 'flavour_text', label: 'Flavour Text', visible: false, width: 200 },
            { key: 'upgrade_id', label: 'Upgrade ID', visible: false, width: 100 },
            { key: 'awaken_riddle', label: 'Awaken Riddle', visible: false, width: 200 },
            { key: 'awaken_clear', label: 'Awaken Clear', visible: false, width: 200 }
        ];

        // --- Multi-API Fetch Helper (BATCH OPTIMIZED) ---
        const fetchAIAnalysis = async (itemsToAnalyze, provider, activeKey, modelName, systemPrompt) => {
            const userPrompt = `ZU BEWERTENDE ITEMS:\n\n` + itemsToAnalyze.map(item => `--- ITEM ID: ${item.id} ---
- Name: ${item.name}
- Kategorie (Art): ${item.category}
- Beschreibung: ${item.desc}
- Flavour Text: ${item.flavour_text}
- Typ: ${item.type || 'all'}
- Sub-Typ: ${item.subType || 'Keiner'}
- Klasse: ${item.klasse || 'Alle'}
- Volk: ${item.volk || 'Alle'}
- Power Cost (PC): ${item.power_cost}
- Wert: ${item.wert || 0}
- Trade-off: ${String(item.is_tradeoff).toLowerCase() === 'true' ? 'Ja' : 'Nein'}
- Attunement Req: ${Array.isArray(item.attunement_req) ? item.attunement_req.join(', ') : item.attunement_req}
- Allg. Tags: ${item.tags || 'Keine'}
- Motivator: ${item.tags_motivator || '-'}
- Zeit: ${item.tags_zeitaufwand || '-'}
- Thema: ${item.tags_thema || '-'}`).join('\n\n');

            let url, payload, headers;

            if (provider === 'gemini') {
                url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeKey}`;
                headers = { 'Content-Type': 'application/json' };
                payload = { 
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    contents: [{ parts: [{ text: userPrompt }] }],
                    generationConfig: {
                        temperature: 0.2,
                        responseMimeType: "application/json"
                    }
                };
            } else if (provider === 'openai') {
                url = 'https://api.openai.com/v1/chat/completions';
                headers = { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${activeKey}`
                };
                payload = {
                    model: modelName,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userPrompt }
                    ],
                    response_format: { type: "json_object" },
                    temperature: 0.2
                };
            }

            const maxRetries = 3;
            const delays = [1500, 3000, 6000];

            for (let attempt = 0; attempt <= maxRetries; attempt++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        const errBody = await response.text();
                        if (response.status === 400 || response.status === 401 || response.status === 403) throw new Error("API-Key ungültig oder fehlt.");
                        if (response.status === 404) throw new Error(`Modell '${modelName}' nicht gefunden. Bitte prüfe die Einstellungen.`);
                        throw new Error(`HTTP error! status: ${response.status} - ${errBody}`);
                    }
                    
                    const result = await response.json();
                    let text = '';
                    
                    if (provider === 'gemini') {
                        text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    } else if (provider === 'openai') {
                        text = result.choices?.[0]?.message?.content;
                    }
                    
                    if (text) {
                        try {
                            const cleanText = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                            const parsedData = JSON.parse(cleanText);
                            return { success: true, data: parsedData };
                        } catch(e) {
                            console.error("JSON Parse Error", e, text);
                            throw new Error("KI hat ungültiges JSON geliefert.");
                        }
                    }
                    throw new Error("Unerwartetes Antwortformat der KI.");
                } catch (error) {
                    if (error.message.includes("API-Key") || error.message.includes("404") || attempt === maxRetries) {
                        return { success: false, error: error.message };
                    }
                    await new Promise(resolve => setTimeout(resolve, delays[attempt]));
                }
            }
        };

        // --- Chart Component ---
        const ChartComponent = ({ type, data, options, onChartClick }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                
                const mergedOptions = { ...options };
                if (onChartClick) {
                    mergedOptions.onClick = (event, elements, chart) => {
                        if (elements && elements.length > 0) {
                            const index = elements[0].index;
                            const label = chart.data.labels[index];
                            onChartClick(label);
                        }
                    };
                }
                
                chartInstance.current = new Chart(ctx, { type, data, options: mergedOptions });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [type, data, options, onChartClick]);

            return <canvas ref={chartRef} />;
        };

        // --- Generic Modal Pill Component ---
        const ModalPillField = ({ label, icon, value, onChange, categoryType, placeholder }) => {
            const tags = Array.isArray(value) ? value : parseTags(value);
            return (
                <div className="flex flex-col gap-1.5 bg-forge-900 p-2.5 rounded-lg border border-forge-700 shadow-inner">
                    <label className="text-[10px] text-gray-400 font-bold uppercase tracking-wider flex items-center gap-1.5">

                    </label>
                    <div className="flex flex-wrap gap-1 min-h-[22px]">
                        {tags.length > 0 ? tags.map((t, i) => (
                            <span key={i} className={`text-[10px] px-1.5 py-0.5 rounded border shadow-sm whitespace-nowrap ${getTagColor(t, categoryType)}`}>
                                {t}
                            </span>
                        )) : <span className="text-[10px] text-gray-600 italic py-0.5">Keine Einträge</span>}
                    </div>
                    <input 
                        type="text" 
                        value={Array.isArray(value) ? value.join(', ') : (value || '')} 
                        onChange={onChange} 
                        className="w-full bg-transparent border-b border-forge-700 hover:border-gray-500 focus:border-forge-accent outline-none text-xs p-1 mt-1 text-gray-200 transition-colors" 
                        placeholder={placeholder} 
                    />
                </div>
            );
        };

        // --- Main Application ---
        const App = () => {
            const [rawFile, setRawFile] = useState(null); 
            const [data, setData] = useState([]);
            const [metadata, setMetadata] = useState(null);
            
            // Generate basic headers array based on defaultColumns
            const headers = useMemo(() => defaultColumns.map(c => c.key).concat(['desc']), []);
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [infoModalItem, setInfoModalItem] = useState(null);
            const [showMobileSettings, setShowMobileSettings] = useState(false);

            // Unsaved Changes Tracking
            const [hasUnsavedChanges, setHasUnsavedChanges] = useState(false);

            // Filter & State for Recently Added
            const [recentlyAddedIds, setRecentlyAddedIds] = useState([]);
            const [showRecentlyAdded, setShowRecentlyAdded] = useState(false);

            // Combination Filter
            const [combinationFilterIds, setCombinationFilterIds] = useState(null);

            // Chart Filtering State
            const [excludedCategories, setExcludedCategories] = useState(() => JSON.parse(localStorage.getItem('dnd_chart_excluded_categories') || '[]'));
            const [hiddenIsolatedTags, setHiddenIsolatedTags] = useState(() => JSON.parse(localStorage.getItem('dnd_hidden_isolated_tags') || '[]'));

            // Paste Feature State
            const [showPasteModal, setShowPasteModal] = useState(false);
            const [pasteText, setPasteText] = useState('');

            // File Import Feature State
            const importFileInputRef = useRef(null);
            const [showImportConflictModal, setShowImportConflictModal] = useState(false);
            const [importConflicts, setImportConflicts] = useState([]);
            const [importNonConflicts, setImportNonConflicts] = useState([]);
            const [showDetailedConflicts, setShowDetailedConflicts] = useState(true);

            // Columns Management State
            const [columns, setColumns] = useState(() => {
                const saved = localStorage.getItem('dnd_columns_config_v7');
                if (saved) {
                    try { 
                        let parsed = JSON.parse(saved);
                        if (!parsed[0].width) {
                            parsed = parsed.map(c => ({...c, width: defaultColumns.find(d => d.key === c.key)?.width || 150}));
                        }
                        if (parsed.length === defaultColumns.length) return parsed;
                    } catch(e) {}
                }
                return defaultColumns;
            });
            const [showColumnMenu, setShowColumnMenu] = useState(false);
            const colMenuRef = useRef(null);

            // --- API Settings State ---
            const [apiProvider, setApiProvider] = useState(() => localStorage.getItem('dnd_api_provider') || 'openai');
            const [geminiKey, setGeminiKey] = useState(() => localStorage.getItem('dnd_gemini_key') || '');
            const [geminiModel, setGeminiModel] = useState(() => localStorage.getItem('dnd_gemini_model') || 'gemini-2.5-flash');
            const [openAiKey, setOpenAiKey] = useState(() => localStorage.getItem('dnd_openai_key') || '');
            const [openAiModel, setOpenAiModel] = useState(() => localStorage.getItem('dnd_openai_model') || 'gpt-4o-mini');
            
            // --- Custom Prompt State ---
            const [systemPrompt, setSystemPrompt] = useState(() => localStorage.getItem('dnd_ai_system_prompt') || DEFAULT_AI_PROMPT);
            const [showPromptModal, setShowPromptModal] = useState(false);
            const [tempPrompt, setTempPrompt] = useState('');

            const [globalError, setGlobalError] = useState(null);
            const [globalSuccess, setGlobalSuccess] = useState(null);

            const [aiFeedback, setAiFeedback] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [aiError, setAiError] = useState(null);

            // Multi-Select & Batch KI State
            const [isSelectionMode, setIsSelectionMode] = useState(false);
            const [selectedIds, setSelectedIds] = useState([]);
            const [batchProgress, setBatchProgress] = useState(null);
            const cancelBatchRef = useRef(false);

            const [searchTerm, setSearchTerm] = useState('');
            const [filterCategory, setFilterCategory] = useState('all');
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });

            const [tagFilterMode, setTagFilterMode] = useState({});
            const [showTagFilters, setShowTagFilters] = useState(false);
            
            const [showItemsCategory, setShowItemsCategory] = useState(false);

            const canShareFiles = navigator.canShare && navigator.share;

            // --- Tab Navigation Handler (with History push) ---
            const changeTab = useCallback((newTab) => {

            // --- Effects ---
            useEffect(() => {

            useEffect(() => {

            useEffect(() => {

            }, [systemPrompt]);

            useEffect(() => {
                if (globalSuccess) {
                    const t = setTimeout(() => setGlobalSuccess(null), 3500);
                    return () => clearTimeout(t);
                }
            }, [globalSuccess]);

            useEffect(() => {
                const handleClickOutside = (e) => {

                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            // Unsaved Changes Before Unload
            useEffect(() => {

                    }

                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [hasUnsavedChanges]);

            // History Popstate / Back Navigation
            useEffect(() => {

                const handlePopState = (e) => {

                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            // Backspace Navigation
            useEffect(() => {

                                      activeElement.tagName === 'TEXTAREA' || 
                                      activeElement.tagName === 'SELECT' || 
                                      activeElement.isContentEditable;
                        
                        if (!isInput && activeTab === 'table') {
                            e.preventDefault();
                            window.history.back();
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [activeTab]);

            // --- ID Scanner & Repair Logic ---
            const handleRepairIds = () => {
                if (!data || data.length === 0) return;

                const getPrefix = (cat) => {
                    const c = normalizeStr(cat);
                    if (c === 'eigenname_t2') return 'en2';
                    if (c === 'eigenname_t1') return 'en1';
                    if (c === 'adjektiv') return 'adj';
                    if (c === 'item') return 'i';
                    if (c === 'merkmal') return 'm';
                    if (c.includes('praefix') || c.includes('präfix')) return 'p';
                    if (c.includes('suffix')) return 's';
                    return 'x';
                };

                const usedNumbers = {};
                const validIds = new Set();
                
                // Pass 1: Claim all perfectly valid IDs to preserve them
                data.forEach(item => {
                    const prefix = getPrefix(item.category);
                    if (!usedNumbers[prefix]) usedNumbers[prefix] = new Set();
                    
                    if (item.id && item.id.startsWith(prefix)) {
                        const numStr = item.id.slice(prefix.length);
                        const num = parseInt(numStr, 10);
                        if (!isNaN(num) && numStr === num.toString() && num > 0) {
                            if (!usedNumbers[prefix].has(num)) {
                                usedNumbers[prefix].add(num);
                                validIds.add(item.id);
                            }
                        }
                    }
                });

                let changedCount = 0;
                const availableCache = {};

                // Pass 2: Repair broken, missing or duplicated IDs
                const repairedData = data.map(item => {
                    const prefix = getPrefix(item.category);
                    if (!usedNumbers[prefix]) usedNumbers[prefix] = new Set();
                    if (!availableCache[prefix]) availableCache[prefix] = 1;
                    
                    if (item.id && validIds.has(item.id)) {
                        validIds.delete(item.id); // Consume to prevent duplicates from passing
                        return item;
                    }

                    changedCount++;
                    let nextNum = availableCache[prefix];
                    while (usedNumbers[prefix].has(nextNum)) {
                        nextNum++;
                    }
                    usedNumbers[prefix].add(nextNum);
                    availableCache[prefix] = nextNum + 1; // Optimization for next scan

                    return { ...item, id: `${prefix}${nextNum}` };
                });

                if (changedCount > 0) {
                    setData(repairedData);
                    setHasUnsavedChanges(true);
                    setGlobalSuccess(`${changedCount} fehlerhafte/fehlende IDs wurden repariert und chronologisch neu zugewiesen!`);
                } else {
                    setGlobalSuccess("Alle IDs sind bereits lückenlos, einzigartig und passend zur Kategorie formatiert.");
                }
            };

            // --- Copy JSON Snippet Logic ---
            const fallbackCopyTextToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {
                    console.error('Fallback: Fehler beim Kopieren', err);
                    setGlobalError("Fehler beim Kopieren. Möglicherweise blockiert der Browser den Zugriff.");
                }
                document.body.removeChild(textArea);
            };

            const handleCopyJSON = () => {
                if (selectedIds.length === 0) return;
                const selectedItems = data.filter(d => selectedIds.includes(d.id));
                const jsonStr = JSON.stringify(selectedItems, null, 2);
                
                if (!navigator.clipboard) {
                    fallbackCopyTextToClipboard(jsonStr);
                    setGlobalSuccess(`${selectedItems.length} Einträge als JSON kopiert!`);
                } else {
                    navigator.clipboard.writeText(jsonStr).then(() => {
                        setGlobalSuccess(`${selectedItems.length} Einträge als JSON kopiert!`);
                    }).catch(() => {
                        fallbackCopyTextToClipboard(jsonStr);
                        setGlobalSuccess(`${selectedItems.length} Einträge als JSON kopiert! (Fallback)`);
                    });
                }
            };

            // --- Shared Conflict Check Logic ---
            const processNewRowsWithConflicts = (newRows) => {
                const existingIdsMap = new Map();
                const existingNamesMap = new Map();
                const existingDescsMap = new Map();

                data.forEach(d => {
                    if (d.id) existingIdsMap.set(String(d.id).trim(), d);
                    if (d.name) existingNamesMap.set(normalizeStr(d.name), d);
                    
                    const cleanDesc = normalizeForMatch(d.desc);
                    if (cleanDesc && cleanDesc.length > 10) {
                        existingDescsMap.set(cleanDesc, d);
                    }
                });

                const conflicts = [];
                const nonConflicts = [];

                newRows.forEach((importedRow, idx) => {
                    const normId = String(importedRow.id || '').trim();
                    const normName = normalizeStr(importedRow.name);
                    const cleanDesc = normalizeForMatch(importedRow.desc);

                    let conflictExisting = null;
                    let conflictReason = '';

                    if (normId && existingIdsMap.has(normId) && !normId.startsWith('import_') && !normId.startsWith('paste_')) {
                        conflictExisting = existingIdsMap.get(normId);
                        conflictReason = 'Gleiche ID';
                    } 
                    else if (normName && existingNamesMap.has(normName)) {
                        conflictExisting = existingNamesMap.get(normName);
                        conflictReason = 'Gleicher Name';
                    } 
                    else if (cleanDesc && cleanDesc.length > 10 && existingDescsMap.has(cleanDesc)) {
                        conflictExisting = existingDescsMap.get(cleanDesc);
                        conflictReason = 'Gleiche Beschreibung';
                    }

                    if (conflictExisting) {
                        conflicts.push({
                            imported: importedRow,
                            existing: conflictExisting,
                            decision: 'skip',
                            importIndex: idx,
                            reason: conflictReason
                        });
                    } else {
                        nonConflicts.push(importedRow);
                    }
                });

                if (conflicts.length > 0) {
                    setImportNonConflicts(nonConflicts);
                    setImportConflicts(conflicts);
                    setShowImportConflictModal(true);
                } else {
                    setData(prev => [...nonConflicts, ...prev]);
                    setRecentlyAddedIds(nonConflicts.map(r => r.id));
                    setShowRecentlyAdded(true);
                    setHasUnsavedChanges(true);
                    setGlobalSuccess(`${nonConflicts.length} neue Einträge erfolgreich hinzugefügt!`);
                    setSortConfig({ key: null, direction: 'asc' });
                    changeTab('table');
                }
            };

            // --- Smart Patcher Logic (V2 Migration) ---
            const handleMigrationExport = () => {
                if (!data || data.length === 0) {

                const counts = { 'Aktion': 0, 'Bonusaktion': 0, 'Reaktion': 0, 'Passiv': 0, 'Rast': 0, 'Erkundung': 0, 'Sonstiges': 0 };
                dashboardData.forEach(item => {
                    const tags = parseTags(item.tags_zeitaufwand).map(t => t.toLowerCase());
                    if (tags.length === 0) counts['Sonstiges']++;
                    else {
                        tags.forEach(t => {
                            if (t === 'aktion') counts['Aktion']++;
                            else if (t === 'bonusaktion') counts['Bonusaktion']++;
                            else if (t === 'reaktion') counts['Reaktion']++;
                            else if (t === 'passiv') counts['Passiv']++;
                            else if (t === 'rast') counts['Rast']++;
                            else if (t === 'erkundung') counts['Erkundung']++;
                            else counts['Sonstiges']++;
                        });
                    }
                });
                return {
                    labels: Object.keys(counts).filter(k => counts[k] > 0),
                    datasets: [{
                        data: Object.keys(counts).filter(k => counts[k] > 0).map(k => counts[k]),
                        backgroundColor: ['#3b82f6', '#f59e0b', '#ef4444', '#10b981', '#8b5cf6', '#06b6d4', '#6b7280'],
                        borderWidth: 0
                    }]
                };
            }, [dashboardData]);

            const chartDataMotivator = useMemo(() => {
                if (dashboardData.length === 0) return null;
                const targets = ['Kampf', 'Taktik', 'Teamplay', 'Rollenspiel', 'Risiko'];
                const counts = { 'Kampf': 0, 'Taktik': 0, 'Teamplay': 0, 'Rollenspiel': 0, 'Risiko': 0 };
                dashboardData.forEach(item => {
                    const tags = parseTags(item.tags_motivator).map(t => capitalizeStr(t.toLowerCase()));
                    tags.forEach(t => {
                        if (targets.includes(t)) counts[t]++;
                    });
                });
                return {
                    labels: targets,
                    datasets: [{
                        label: 'Motivator-Verteilung',
                        data: targets.map(t => counts[t]),
                        backgroundColor: 'rgba(139, 92, 246, 0.4)', 
                        borderColor: 'rgba(139, 92, 246, 1)',
                        pointBackgroundColor: 'rgba(139, 92, 246, 1)',
                        borderWidth: 2
                    }]
                };
            }, [dashboardData]);

            const chartDataThema = useMemo(() => {
                if (dashboardData.length === 0) return null;
                const counts = {};
                dashboardData.forEach(item => {
                    const tags = parseTags(item.tags_thema);
                    tags.forEach(t => {
                        const clean = capitalizeStr(t.toLowerCase());
                        if (clean) counts[clean] = (counts[clean] || 0) + 1;
                    });
                });
                const topThemen = Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 8);
                return {
                    labels: topThemen,
                    datasets: [{
                        label: 'Häufigste Themen',
                        data: topThemen.map(t => counts[t]),
                        backgroundColor: 'rgba(239, 68, 68, 0.7)', 
                        borderColor: 'rgba(239, 68, 68, 1)',
                        borderWidth: 1
                    }]
                };
            }, [dashboardData]);

            const chartDataCategory = useMemo(() => { 
                if (dashboardData.length === 0) return null; 
                const counts = {};
                dashboardData.forEach(item => {
                    const cat = capitalizeStr(normalizeStr(item.category));
                    if (!excludedCategories.includes(cat)) {
                        counts[cat] = (counts[cat] || 0) + 1;
                    }
                });
                const labels = Object.keys(counts).filter(k => counts[k] > 0);
                return { 
                    labels: labels, 
                    datasets: [{ 
                        data: labels.map(k => counts[k]), 
                        backgroundColor: ['#06b6d4', '#8b5cf6', '#ec4899', '#10b981', '#f59e0b', '#ef4444', '#3b82f6', '#6b7280', '#eab308', '#14b8a6'], 
                        borderWidth: 0 
                    }] 
                }; 
            }, [dashboardData, excludedCategories]);

            // Chart Click Handlers
            const handleChartClick = (label, chartId) => {
                setCombinationFilterIds(null);
                setShowRecentlyAdded(false);
                setTagFilterMode({});
                setSearchTerm('');
                setFilterCategory('all');

                if (chartId === 'pc') {
                    setSearchTerm(`pc:${label.replace('PC ', '')}`);
                } else if (chartId === 'action' || chartId === 'motivator' || chartId === 'thema') {
                    setTagFilterMode({ [label]: 'include' });
                } else if (chartId === 'category') {
                    setFilterCategory(label);
                }

                setSortConfig({ key: 'wert', direction: 'desc' });
                changeTab('table');
            };

            // Kombinations-Finder (Adjektive/Eigennamen und passende Merkmale für Relikte)
            const prefixSuffixCombinations = useMemo(() => {
                const items = dashboardData.filter(d => {
                    const cat = normalizeStr(d.category);
                    return cat === 'adjektiv' || cat === 'eigenname_t1' || cat === 'eigenname_t2';
                });
                const merkmale = dashboardData.filter(d => normalizeStr(d.category) === 'merkmal');

                return items.map(item => {
                    const itemMatchTags = [
                        ...parseTags(item.tags_thema),
                        ...(item.tags ? parseTags(item.tags) : [])
                    ].map(t => t.toLowerCase());
                    
                    const matchingIds = [];
                    merkmale.forEach(m => {
                        const mMatchTags = [
                            ...parseTags(m.tags_thema),
                            ...(m.tags ? parseTags(m.tags) : [])
                        ].map(t => t.toLowerCase());
                        
                        const hasIntersection = itemMatchTags.some(tag => mMatchTags.includes(tag));
                        if (hasIntersection) {
                            matchingIds.push(m.id);
                        }
                    });
                    return {
                        ...item,
                        matchingIds,
                        matchTagsArr: itemMatchTags 
                    };
                }).sort((a, b) => b.matchingIds.length - a.matchingIds.length); 
            }, [dashboardData]);

            const unmatchedTags = useMemo(() => {
                const prefixSuffixItems = dashboardData.filter(d => {
                    const cat = normalizeStr(d.category);
                    return cat === 'adjektiv' || cat === 'eigenname_t1' || cat === 'eigenname_t2';
                });
                const merkmale = dashboardData.filter(d => normalizeStr(d.category) === 'merkmal');

                const allPrefixSuffixTags = new Set();
                prefixSuffixItems.forEach(item => {
                    const tags = [...parseTags(item.tags_thema), ...(item.tags ? parseTags(item.tags) : [])];
                    tags.forEach(t => allPrefixSuffixTags.add(t.toLowerCase()));
                });

                const unmatched = new Set();
                merkmale.forEach(m => {
                    const tags = [...parseTags(m.tags_thema), ...(m.tags ? parseTags(m.tags) : [])];
                    tags.forEach(t => {
                        if (!allPrefixSuffixTags.has(t.toLowerCase())) {
                            unmatched.add(t.toLowerCase());
                        }
                    });
                });

                return Array.from(unmatched).sort();
            }, [dashboardData]);

            const visibleUnmatchedTags = useMemo(() => {
                return unmatchedTags.filter(t => !hiddenIsolatedTags.includes(t));
            }, [unmatchedTags, hiddenIsolatedTags]);

            const handleCombinationClick = (item) => {
                const idsToShow = [item.id, ...item.matchingIds];
                setCombinationFilterIds(idsToShow);
                setSearchTerm('');
                setFilterCategory('all');
                setTagFilterMode({});
                setShowRecentlyAdded(false);
                setSortConfig({ key: 'wert', direction: 'desc' });
                changeTab('table');
            };

            const lineBarOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#9ca3af' }, grid: { color: '#3f3f46', drawBorder: false } }, x: { ticks: { color: '#9ca3af' }, grid: { display: false } } } };
            const radarOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { r: { angleLines: { color: '#3f3f46' }, grid: { color: '#3f3f46' }, pointLabels: { color: '#e5e7eb', font: { size: 11 } }, ticks: { display: false } } } };
            const pieOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#e5e7eb', font: { size: 11 } } } }, cutout: '60%' };

            const activeFiltersCount = Object.keys(tagFilterMode).length;
            const visibleColumns = columns.filter(c => c.visible);

            const totalTableWidth = useMemo(() => {
                let w = visibleColumns.reduce((sum, col) => sum + col.width, 0);
                if (isSelectionMode) w += 40; 
                w += 50; // Del column
                return w;
            }, [visibleColumns, isSelectionMode]);

            // --- Dynamic Table Renderers ---
            const renderTagColumn = (originalIndex, row, field, tagsArray, categoryType, placeholder, tdKey, extraContent = null) => (
                <td 
                    key={tdKey}
                    className={`p-1 align-top transition-colors ${field === 'tags' ? '' : 'border-l border-forge-700'}`}
                    onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('bg-forge-800/80'); }}
                    onDragLeave={(e) => { e.currentTarget.classList.remove('bg-forge-800/80'); }}
                    onDrop={(e) => {
                        e.preventDefault();
                        e.currentTarget.classList.remove('bg-forge-800/80');
                        const tag = e.dataTransfer.getData('text/plain');
                        const sourceField = e.dataTransfer.getData('sourceField');
                        
                        if (tag && sourceField) {
                            const lowerTag = tag.toLowerCase();
                            const updates = {};
                            if (sourceField !== field) {
                                const sourceTags = parseTags(row[sourceField]).filter(t => t.toLowerCase() !== lowerTag);
                                updates[sourceField] = sourceTags.join(', ');
                                const targetTags = parseTags(row[field]);
                                if (!targetTags.includes(lowerTag)) updates[field] = targetTags.length > 0 ? row[field] + ', ' + lowerTag : lowerTag;
                                handleMultipleCellEdits(originalIndex, updates);
                            }
                        }
                    }}
                >
                    <div className="flex flex-col gap-0.5 h-full w-full">
                        <div className="flex flex-wrap gap-1 min-h-[20px] p-0.5">
                            {tagsArray.map(t => (
                                <span 
                                    key={t} 
                                    draggable="true"
                                    onDragStart={(e) => { e.dataTransfer.setData('text/plain', t); e.dataTransfer.setData('sourceField', field); }}
                                    className={`text-[10px] px-1.5 py-0.5 rounded border cursor-grab active:cursor-grabbing shadow-sm whitespace-nowrap ${getTagColor(t, categoryType)}`}
                                    title="Tag gedrückt halten, um es zu verschieben"
                                >{t}</span>
                            ))}
                        </div>
                        <input 
                            type="text" 
                            value={row[field] || ''} 
                            onChange={(e) => handleCellEdit(originalIndex, field, e.target.value)} 
                            className="w-full bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none text-xs p-1" 
                            placeholder={placeholder} 
                        />
                        {extraContent}
                    </div>
                </td>
            );

            const renderCell = (col, row, originalIndex, isChecked, isSelected) => {
                switch(col.key) {
                    case 'id': return (
                        <td key={col.key} className="p-1 align-top">
                            <input type="text" value={row.id || ''} onChange={(e) => handleCellEdit(originalIndex, 'id', e.target.value)} className="w-full bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none text-gray-500 font-mono text-[10px] sm:text-xs" />
                        </td>
                    );
                    case 'name': return (
                        <td key={col.key} className="p-1 align-top">
                            <div className="flex items-start gap-1 w-full">
                                <input type="text" value={row.name || ''} onChange={(e) => handleCellEdit(originalIndex, 'name', e.target.value)} className="flex-1 w-0 min-w-0 bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none font-bold text-forge-light text-xs sm:text-sm pt-0.5" />
                                <button onClick={() => openInfoModal(row)} className={`transition-colors flex-shrink-0 p-1 ${row.last_checked ? 'text-blue-400 hover:text-blue-300 glow-ai rounded-full' : 'text-gray-500 hover:text-blue-400'}`} title={row.last_checked ? `Letzter KI Check: ${row.last_checked}` : 'KI Check & Details (Modal)'}>
                                    {apiProvider === 'gemini' ? <IconSparkles /> : <IconBrain />}
                                </button>
                            </div>
                        </td>
                    );
                    case 'category': return (
                        <td key={col.key} className="p-1 align-top">
                            <input list="category-options" type="text" value={row.category || ''} onChange={(e) => handleCellEdit(originalIndex, 'category', e.target.value)} className="w-full bg-forge-900 border border-transparent hover:border-gray-500 focus:border-forge-accent outline-none px-1 py-1 rounded text-xs" />
                        </td>
                    );
                    case 'type': return renderTagColumn(originalIndex, row, 'type', parseTags(row.type), 'type', 'Waffe, Rüstung...', col.key);
                    case 'subType': return renderTagColumn(originalIndex, row, 'subType', parseTags(row.subType), 'subtype', 'Pike, Schwert...', col.key);
                    case 'klasse': return renderTagColumn(originalIndex, row, 'klasse', parseTags(row.klasse), 'klasse', 'Kämpfer, Magier...', col.key);
                    case 'volk': return renderTagColumn(originalIndex, row, 'volk', parseTags(row.volk), 'volk', 'Elf, Zwerg...', col.key);
                    case 'source': return (
                        <td key={col.key} className="p-1 align-top">
                            <input type="text" value={row.source || ''} onChange={(e) => handleCellEdit(originalIndex, 'source', e.target.value)} className="w-full bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none text-[10px] p-1 text-gray-400" placeholder="Source" />
                        </td>
                    );
                    case 'tags': return renderTagColumn(originalIndex, row, 'tags', parseTags(row.tags), 'all', 'Alte unsortierte Tags', col.key);
                    case 'tags_motivator': return renderTagColumn(originalIndex, row, 'tags_motivator', parseTags(row.tags_motivator), 'motivator', 'kampf, risiko...', col.key);
                    case 'tags_zeitaufwand': return renderTagColumn(originalIndex, row, 'tags_zeitaufwand', parseTags(row.tags_zeitaufwand), 'zeit', 'aktion, passiv...', col.key);
                    case 'tags_thema': return renderTagColumn(originalIndex, row, 'tags_thema', parseTags(row.tags_thema), 'thema', 'feuer, eis...', col.key);
                    case 'attunement_req': return (
                        <td key={col.key} className="p-1 text-center align-top">
                            <input type="text" value={Array.isArray(row.attunement_req) ? row.attunement_req.join(', ') : (row.attunement_req || '')} onChange={(e) => handleCellEdit(originalIndex, 'attunement_req', e.target.value.split(',').map(s=>s.trim()).filter(Boolean))} className={`w-full bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none text-xs p-1 text-center ${row.attunement_req && row.attunement_req.length > 0 && row.attunement_req[0] !== 'false' && row.attunement_req[0] !== 'none' ? 'text-purple-400 font-bold' : 'text-gray-500'}`} placeholder="false, true, class_..." />
                        </td>
                    );
                    case 'power_cost': return (
                        <td key={col.key} className="p-1 border-l border-forge-700 bg-forge-800/20 align-top">
                            <input type="number" step="0.1" value={row.power_cost !== null && row.power_cost !== undefined ? row.power_cost : ''} onChange={(e) => handleCellEdit(originalIndex, 'power_cost', e.target.value)} className="w-full bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none p-1 text-right font-mono text-blue-300 font-bold spin-styled-blue text-xs" />
                        </td>
                    );
                    case 'wert': return (
                        <td key={col.key} className="p-1 bg-forge-800/20 align-top">
                            <input type="number" step="0.1" value={row.wert !== null && row.wert !== undefined ? row.wert : ''} onChange={(e) => handleCellEdit(originalIndex, 'wert', e.target.value)} className="w-full bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none p-1 text-right text-amber-500 font-mono spin-styled-amber text-xs" />
                        </td>
                    );
                    case 'is_tradeoff': return (
                        <td key={col.key} className="p-1 bg-forge-800/20 text-center align-top">
                            <select value={row.is_tradeoff || 'false'} onChange={(e) => handleCellEdit(originalIndex, 'is_tradeoff', e.target.value)} className={`w-full bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none text-xs p-1 text-center ${String(row.is_tradeoff).toLowerCase() === 'true' ? 'text-red-400' : 'text-gray-500'}`}>
                                <option value="true">True</option><option value="false">False</option>
                            </select>
                        </td>
                    );
                    case 'manually_checked': return (
                        <td key={col.key} className="p-1 border-l border-forge-700 text-center align-top pt-2">
                            <label className="flex items-center justify-center cursor-pointer p-1 w-full" title="Manuell geprüft (Überspringt KI-Check Notwendigkeit)">
                                <input 
                                    type="checkbox" 
                                    checked={isChecked} 
                                    onChange={(e) => handleCellEdit(originalIndex, 'manually_checked', e.target.checked)}
                                    className="w-4 h-4 rounded accent-emerald-500 bg-forge-900 border-forge-700 focus:ring-emerald-500 focus:ring-2 cursor-pointer"
                                />
                            </label>
                        </td>
                    );
                    case 'flavour_text': return (
                        <td key={col.key} className="p-1 align-top border-l border-forge-700">
                            <textarea value={row.flavour_text || ''} onChange={(e) => handleCellEdit(originalIndex, 'flavour_text', e.target.value)} className="w-full bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none text-[10px] text-gray-400 h-full resize-none custom-scrollbar p-1 italic" placeholder="Flavour Text..."/>
                        </td>
                    );
                    case 'upgrade_id': return (
                        <td key={col.key} className="p-1 align-top">
                            <input type="text" value={row.upgrade_id || ''} onChange={(e) => handleCellEdit(originalIndex, 'upgrade_id', e.target.value)} className="w-full bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none text-xs p-1 font-mono text-cyan-400" placeholder="Upgrade ID" />
                        </td>
                    );
                    case 'awaken_riddle': return (
                        <td key={col.key} className="p-1 align-top">
                            <textarea value={row.awaken_riddle || ''} onChange={(e) => handleCellEdit(originalIndex, 'awaken_riddle', e.target.value)} className="w-full bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none text-[10px] text-indigo-300 h-full resize-none custom-scrollbar p-1" placeholder="Rätsel..."/>
                        </td>
                    );
                    case 'awaken_clear': return (
                        <td key={col.key} className="p-1 align-top">
                            <textarea value={row.awaken_clear || ''} onChange={(e) => handleCellEdit(originalIndex, 'awaken_clear', e.target.value)} className="w-full bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none text-[10px] text-emerald-300 h-full resize-none custom-scrollbar p-1" placeholder="Clear Condition..."/>
                        </td>
                    );
                    default: return null;
                }
            };

            const renderSuggestionButton = (field, suggestionValue, label) => {
                if (suggestionValue === null || suggestionValue === undefined) return null;
                
                const isArray = Array.isArray(suggestionValue);
                if (!isArray && typeof suggestionValue === 'string' && suggestionValue.trim() === '' && !field.startsWith('tags')) return null;
                if (isArray && suggestionValue.length === 0) return null;

                const isBoolean = typeof suggestionValue === 'boolean' || suggestionValue === 'true' || suggestionValue === 'false';
                let displayValue = isArray ? suggestionValue.join(', ') : suggestionValue;
                let applyValue = suggestionValue;

                if (isBoolean) {
                    const boolVal = typeof suggestionValue === 'boolean' ? suggestionValue : (suggestionValue === 'true');
                    displayValue = boolVal ? 'Ja (True)' : 'Nein (False)';
                    applyValue = boolVal ? 'true' : 'false';
                }

                return (
                    <div className="flex flex-col gap-1 mt-2 p-2 bg-blue-900/30 border border-blue-700/50 rounded text-sm">
                        <span className="text-xs text-blue-300 font-bold">{label} Vorschlag:</span>
                        <span className="text-gray-200 italic mb-1 line-clamp-3" title={displayValue}>"{displayValue}"</span>
                        <button onClick={() => handleApplySuggestion(field, applyValue)} className="self-start flex items-center gap-1 bg-blue-600 hover:bg-blue-500 text-white px-2 py-1 rounded text-xs font-semibold shadow transition-colors">
                            <IconArrowDown /> Übernehmen
                        </button>
                    </div>
                );
            };

            if (!rawFile) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 text-center">
                        <div className="w-20 h-20 bg-forge-800 rounded-full flex items-center justify-center mb-6 border-4 border-forge-accent shadow-[0_0_30px_rgba(217,119,6,0.3)]"><IconUpload /></div>
                        <h1 className="text-3xl sm:text-4xl font-bold mb-4 text-forge-light">Schmiede-Meister</h1>
                        <p className="text-sm sm:text-base text-gray-400 mb-8 max-w-md">Lade deine "schmiede_master_db.json" hoch, um das Balancing deiner Loot-Tabellen zu analysieren und Fehler in der Datei automatisch reparieren zu lassen.</p>
                        
                        <div className="bg-forge-800 p-6 rounded-xl border border-forge-700 shadow-lg flex flex-col items-center gap-4 w-full max-w-sm">
                            <label className="cursor-pointer bg-forge-accent hover:bg-amber-500 text-forge-900 font-bold py-3 px-6 rounded-lg shadow-lg transition-all flex items-center justify-center gap-2 w-full">
                                <IconUpload /><span>JSON-Master auswählen</span>
                                <input type="file" accept=".json" onChange={handleFileUpload} className="hidden" />
                            </label>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col relative overflow-x-hidden">
                    {/* GLOBAL ERROR */}
                    {globalError && (
                        <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-[200] bg-red-900 border border-red-500 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3 animate-[fadeIn_0.3s_ease-in-out]">
                            <IconAlert /><span className="text-sm font-bold">{globalError}</span>
                            <button onClick={() => setGlobalError(null)} className="ml-4 text-red-300 hover:text-white"><IconClose /></button>
                        </div>
                    )}

                    {/* GLOBAL SUCCESS */}
                    {globalSuccess && (
                        <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-[200] bg-emerald-900 border border-emerald-500 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3 animate-[fadeIn_0.3s_ease-in-out]">
                            <IconCheck /><span className="text-sm font-bold">{globalSuccess}</span>
                            <button onClick={() => setGlobalSuccess(null)} className="ml-4 text-emerald-300 hover:text-white"><IconClose /></button>
                        </div>
                    )}

                    {/* HIDDEN IMPORT INPUT */}
                    <input 
                        type="file" 
                        accept=".json" 
                        ref={importFileInputRef} 
                        onChange={handleImportFileChange} 
                        className="hidden" 
                    />

                    {/* IMPORT CONFLICT MODAL */}
                    {showImportConflictModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[250] p-4 animate-[fadeIn_0.2s_ease-in-out]">
                            <div className="bg-forge-800 border border-forge-700 rounded-xl p-4 sm:p-6 w-[98vw] max-w-5xl shadow-2xl relative flex flex-col h-[90vh]">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-xl font-bold text-amber-500 flex items-center gap-2">
                                        <IconAlert /> Konflikte auflösen ({importConflicts.length} Überschneidungen)
                                    </h3>
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowDetailedConflicts(!showDetailedConflicts)} className="text-xs bg-forge-900 border border-forge-600 px-3 py-1.5 rounded text-gray-300 hover:text-white transition-colors">
                                            {showDetailedConflicts ? "Weniger Details" : "Details anzeigen"}
                                        </button>
                                        <button onClick={cancelImport} className="text-gray-400 hover:text-white transition-colors p-1"><IconClose /></button>
                                    </div>
                                </div>
                                <p className="text-sm text-gray-400 mb-4 border-b border-forge-700 pb-4">
                                    Die folgenden Eigenschaften aus dem Import weisen starke Ähnlichkeiten (Name, ID oder Beschreibung) zu bestehenden Einträgen auf.
                                </p>

                                {/* Bulk Actions */}
                                <div className="flex flex-wrap gap-2 mb-4">
                                    <button 
                                        onClick={() => setImportConflicts(prev => prev.map(c => ({...c, decision: 'skip'})))} 
                                        className="bg-forge-900 hover:bg-forge-700 border border-forge-600 text-gray-300 px-3 py-1.5 rounded text-sm font-medium transition-colors"
                                    >
                                        Alle ignorieren (Bestehendes behalten)
                                    </button>
                                    <button 
                                        onClick={() => setImportConflicts(prev => prev.map(c => ({...c, decision: 'overwrite'})))} 
                                        className="bg-red-900/30 hover:bg-red-900/50 border border-red-700/50 text-red-300 px-3 py-1.5 rounded text-sm font-medium transition-colors"
                                    >
                                        Alle überschreiben (Import nutzen)
                                    </button>
                                    <button 
                                        onClick={() => setImportConflicts(prev => prev.map(c => ({...c, decision: 'both'})))} 
                                        className="bg-blue-900/30 hover:bg-blue-900/50 border border-blue-700/50 text-blue-300 px-3 py-1.5 rounded text-sm font-medium transition-colors"
                                    >
                                        Alle doppelt anlegen (Beide behalten)
                                    </button>
                                </div>

                                {/* Conflict List */}
                                <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-4">
                                    {importConflicts.map((conflict, i) => (
                                        <div key={i} className="bg-forge-900 border border-forge-700 rounded-lg p-3 flex flex-col">
                                            <div className="flex justify-between items-start mb-2">
                                                <h4 className="font-bold text-forge-light text-base">{conflict.imported.name}</h4>
                                                <span className="text-[10px] bg-amber-900/30 text-amber-400 px-2 py-0.5 rounded border border-amber-700/50 font-bold tracking-wider uppercase">
                                                    Grund: {conflict.reason}
                                                </span>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-4 mb-3 h-full">
                                                {/* Bestehend */}
                                                <div className={`p-3 rounded border flex flex-col h-full ${conflict.decision === 'skip' || conflict.decision === 'both' ? 'border-emerald-500/50 bg-emerald-900/10' : 'border-forge-700 bg-forge-800'}`}>
                                                    <div className="flex justify-between items-center mb-2">
                                                        <div className="text-xs font-bold text-gray-500 uppercase tracking-wider">Aktuell in DB</div>
                                                        <span className="text-[9px] bg-forge-950 px-1.5 py-0.5 rounded text-gray-500 border border-forge-700">ID: {conflict.existing.id}</span>
                                                    </div>
                                                    <div className="text-xs text-gray-300 mb-2 flex flex-wrap gap-2">
                                                        <span className="text-blue-300 font-mono font-bold">PC: {conflict.existing.power_cost}</span>
                                                        <span className="text-emerald-400">Typ: {conflict.existing.type || '-'}</span>
                                                    </div>
                                                    <p className={`text-xs text-gray-400 italic mb-3 flex-1 ${showDetailedConflicts ? '' : 'line-clamp-3'}`} title={conflict.existing.desc}>{conflict.existing.desc}</p>
                                                    
                                                    <div className="mt-auto space-y-1">
                                                        <div className="text-[10px] flex justify-between border-t border-forge-700/50 pt-1 items-center">
                                                            <span className="text-gray-500 flex-shrink-0">Tags (Gesamt):</span>
                                                            <span className={`text-right truncate ml-2 max-w-[150px] ${getCombinedTags(conflict.existing).length > 0 ? 'text-indigo-400 font-bold' : 'text-red-400 italic'}`} title={getCombinedTags(conflict.existing)}>
                                                                {getCombinedTags(conflict.existing) || 'Keine Tags'}
                                                            </span>
                                                        </div>
                                                        {showDetailedConflicts && (
                                                            <>
                                                                <div className="text-[10px] flex justify-between border-t border-forge-700/50 pt-1">
                                                                    <span className="text-gray-500">Klasse/Volk:</span>
                                                                    <span className="text-gray-300">{conflict.existing.klasse || '-'} / {conflict.existing.volk || '-'}</span>
                                                                </div>
                                                                <div className="text-[10px] flex justify-between border-t border-forge-700/50 pt-1">
                                                                    <span className="text-gray-500">Wert / Req:</span>
                                                                    <span className="text-gray-300">{conflict.existing.wert || 0} / {Array.isArray(conflict.existing.attunement_req) ? conflict.existing.attunement_req.join(', ') : (conflict.existing.attunement_req || 'false')}</span>
                                                                </div>
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                                
                                                {/* Importiert */}
                                                <div className={`p-3 rounded border flex flex-col h-full ${conflict.decision === 'overwrite' || conflict.decision === 'both' ? 'border-red-500/50 bg-red-900/10' : 'border-forge-700 bg-forge-800'}`}>
                                                    <div className="flex justify-between items-center mb-2">
                                                        <div className="text-xs font-bold text-gray-500 uppercase tracking-wider">Aus Import</div>
                                                        <span className="text-[9px] bg-forge-950 px-1.5 py-0.5 rounded text-gray-500 border border-forge-700">ID: {conflict.imported.id}</span>
                                                    </div>
                                                    <div className="text-xs text-gray-300 mb-2 flex flex-wrap gap-2">
                                                        <span className="text-blue-300 font-mono font-bold">PC: {conflict.imported.power_cost}</span>
                                                        <span className="text-red-400">Typ: {conflict.imported.type || '-'}</span>
                                                    </div>
                                                    <p className={`text-xs text-gray-400 italic mb-3 flex-1 ${showDetailedConflicts ? '' : 'line-clamp-3'}`} title={conflict.imported.desc}>{conflict.imported.desc}</p>
                                                    
                                                    <div className="mt-auto space-y-1">
                                                        <div className="text-[10px] flex justify-between border-t border-forge-700/50 pt-1 items-center">
                                                            <span className="text-gray-500 flex-shrink-0">Tags (Gesamt):</span>
                                                            <span className={`text-right truncate ml-2 max-w-[150px] ${getCombinedTags(conflict.imported).length > 0 ? 'text-indigo-400 font-bold' : 'text-red-400 italic'}`} title={getCombinedTags(conflict.imported)}>
                                                                {getCombinedTags(conflict.imported) || 'Keine Tags'}
                                                            </span>
                                                        </div>
                                                        {showDetailedConflicts && (
                                                            <>
                                                                <div className="text-[10px] flex justify-between border-t border-forge-700/50 pt-1">
                                                                    <span className="text-gray-500">Klasse/Volk:</span>
                                                                    <span className="text-gray-300">{conflict.imported.klasse || '-'} / {conflict.imported.volk || '-'}</span>
                                                                </div>
                                                                <div className="text-[10px] flex justify-between border-t border-forge-700/50 pt-1">
                                                                    <span className="text-gray-500">Wert / Req:</span>
                                                                    <span className="text-gray-300">{conflict.imported.wert || 0} / {Array.isArray(conflict.imported.attunement_req) ? conflict.imported.attunement_req.join(', ') : (conflict.imported.attunement_req || 'false')}</span>
                                                                </div>
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Decision Radios */}
                                            <div className="flex gap-4 mt-2">
                                                <label className="flex items-center gap-1.5 text-sm cursor-pointer text-gray-300 hover:text-white">
                                                    <input 
                                                        type="radio" 
                                                        name={`conflict_${i}`} 
                                                        checked={conflict.decision === 'skip'} 
                                                        onChange={() => {
                                                            const newC = [...importConflicts];
                                                            newC[i].decision = 'skip';
                                                            setImportConflicts(newC);
                                                        }} 
                                                        className="accent-forge-accent"
                                                    /> Ignorieren
                                                </label>
                                                <label className="flex items-center gap-1.5 text-sm cursor-pointer text-gray-300 hover:text-white">
                                                    <input 
                                                        type="radio" 
                                                        name={`conflict_${i}`} 
                                                        checked={conflict.decision === 'overwrite'} 
                                                        onChange={() => {
                                                            const newC = [...importConflicts];
                                                            newC[i].decision = 'overwrite';
                                                            setImportConflicts(newC);
                                                        }} 
                                                        className="accent-red-500"
                                                    /> Überschreiben
                                                </label>
                                                <label className="flex items-center gap-1.5 text-sm cursor-pointer text-gray-300 hover:text-white">
                                                    <input 
                                                        type="radio" 
                                                        name={`conflict_${i}`}
