            const [value, setValue] = React.useState(() => {
                try {
                    const stickyValue = window.localStorage.getItem(key);
                    return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
                } catch (err) { return defaultValue; }
            });
            React.useEffect(() => {
                try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (err) { }
            }, [key, value]);
            return [value, setValue];

        const MAX_TRAITS = 18;

        const pcmToWav = (base64PCM, sampleRate = 24000) => {
            const binaryString = window.atob(base64PCM);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const numChannels = 1; const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const buffer = new ArrayBuffer(44 + bytes.length);
            const view = new DataView(buffer);
            const writeString = (view, offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
            writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + bytes.length, true);
            writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true); view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true); view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true); writeString(view, 36, 'data');
            view.setUint32(40, bytes.length, true);
            new Uint8Array(buffer, 44).set(bytes);
            return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
        };

        const Icon = ({ name, className }) => {

        // GANZHEITLICHE BERECHNUNG (Bipolares Spannungs-System)
        const getCoherenceStats = (selectedTraits, praiseLevel, pushbackLevel, enableAppScale) => {
            // 4 Achsen mit negativen und positiven Pulls (Zur Berechnung der inneren Spannung)
            let axes = {
                herz: { pos: 0, neg: 0 }, // -100 (Kühl/Sachlich) bis +100 (Warm/Herzlich)
                hie: { pos: 0, neg: 0 },  // -100 (Autoritär) bis +100 (Augenhöhe/Kollaborativ)
                fok: { pos: 0, neg: 0 },  // -100 (Analytisch/Struktur) bis +100 (Kreativ/Chaos)

            };

            const TRAIT_MAP = {
                enthusiastisch: { herz: 15, fok: 5 }, suess_verspielt: { herz: 25, fok: 10 }, flirty: { herz: 20 },

                dominant: { hie: -35, feed: -15 }, zynisch: { herz: -20, feed: -30 }, arrogant: { herz: -25, hie: -35 },
                kollaborativ: { hie: 30 }, traeumerin: { fok: 30 }, visionaer: { fok: 20, hie: -15 },
                ui_ux_expertin: { fok: -15 }, analytisch: { fok: -30, herz: -10 }, detailversessen: { fok: -25 },
                autoritaer: { hie: -35, feed: -20 }, fliesstext: { fok: 15 }, struktur_ausnahme: { fok: -20 },
                tts_friendly: { fok: 10 }, logik_hueterin: { feed: 20, fok: -10 }, muehe_klausel: { herz: 20 },
                praezisions_switch: { fok: -15, feed: -15 }, dankbare_bescheidenheit: { hie: 20, herz: 15 },
                immersive_technik: { herz: 15 }, anti_halluzination: { fok: -20 }, direkt: { feed: -35 }, diplomatisch: { feed: 35 },
                loyal: { herz: 35, hie: 20 }, bescheiden_zweifelnd: { herz: 15, hie: 40, feed: 20 }, kaempferisch: { fok: 20, feed: -20, hie: -15 }
            };

            selectedTraits.forEach(id => {
                if (TRAIT_MAP[id]) {
                    const map = TRAIT_MAP[id];
                    if (map.herz) map.herz > 0 ? axes.herz.pos += map.herz : axes.herz.neg += Math.abs(map.herz);
                    if (map.hie) map.hie > 0 ? axes.hie.pos += map.hie : axes.hie.neg += Math.abs(map.hie);
                    if (map.fok) map.fok > 0 ? axes.fok.pos += map.fok : axes.fok.neg += Math.abs(map.fok);
                    if (map.feed) map.feed > 0 ? axes.feed.pos += map.feed : axes.feed.neg += Math.abs(map.feed);
                }
            });

            // Globale Settings (Haben massiven Einfluss auf Spannung)
            if (praiseLevel === 'minimal') { axes.herz.neg += 30; axes.feed.neg += 25; }
            if (praiseLevel === 'subtle') { axes.herz.neg += 15; axes.feed.neg += 10; }
            if (praiseLevel === 'warm') { axes.herz.pos += 20; axes.feed.pos += 10; }
            if (praiseLevel === 'enthusiastic') { axes.herz.pos += 35; axes.fok.pos += 15; }

            if (pushbackLevel === 'harmony') { axes.feed.pos += 35; axes.hie.pos += 15; }
            if (pushbackLevel === 'constructive') { axes.feed.neg += 15; axes.hie.pos += 10; } 
            if (pushbackLevel === 'devil') { axes.feed.neg += 40; axes.hie.neg += 30; axes.herz.neg += 15; }

            if (enableAppScale) { axes.herz.pos += 10; axes.feed.pos += 10; }

            const calculateAxis = (data) => {
                const total = data.pos + data.neg;
                if (total === 0) return { position: 0, tension: 0 };
                
                let position = ((data.pos - data.neg) / Math.max(50, total)) * 100;
                position = Math.max(-100, Math.min(100, position));

                const minPull = Math.min(data.pos, data.neg);
                const maxPull = Math.max(data.pos, data.neg);
                const tension = maxPull === 0 ? 0 : (minPull / maxPull) * 100;

                return { position, tension, posPull: data.pos, negPull: data.neg };
            };

            const resHerz = calculateAxis(axes.herz);
            const resHie = calculateAxis(axes.hie);
            const resFok = calculateAxis(axes.fok);
            const resFeed = calculateAxis(axes.feed);

            // Gesamte Stabilität = 100 - Durchschnittliche Spannung
            const avgTension = (resHerz.tension + resHie.tension + resFok.tension + resFeed.tension) / 4;
            const stability = Math.max(0, 100 - avgTension);

            return { herz: resHerz, hie: resHie, fok: resFok, feed: resFeed, stability };
        };

        const generateAnalysis = (stats) => {
            const isStable = stats.stability > 70;
            const isUnstable = stats.stability < 40;

            // Finde die Achse mit der größten Spannung
            const axesArr = [
                { name: 'Tonalität (Kühl vs. Herzlich)', tension: stats.herz.tension },
                { name: 'Hierarchie (Autoritär vs. Augenhöhe)', tension: stats.hie.tension },
                { name: 'Fokus (Analytisch vs. Kreativ)', tension: stats.fok.tension },
                { name: 'Feedback (Gnadenlos vs. Sanft)', tension: stats.feed.tension }
            ].sort((a, b) => b.tension - a.tension);
            
            const maxTensionAxis = axesArr[0];

            let title = ""; let core = "";
            
            if (isStable) {
                title = "Hohe System-Konsistenz";
                core = "Diese Persona ist emotional und strukturell extrem logisch aufgebaut. Es gibt kaum widersprüchliche Anweisungen. Die KI wird stabil, organisch und berechenbar auf deine Prompts reagieren, ohne versehentlich aus der Rolle zu fallen.";
            } else if (isUnstable) {
                title = "Achtung: Massive Inkonsistenz";
                core = `Die KI leidet unter starken logischen Widersprüchen (Scenario Bleeding erwartet). Größter Konflikt bei: ${maxTensionAxis.name}. Die KI weiß nicht, ob sie streng oder süß reagieren soll und wird diese Extreme künstlich vermischen.`;
            } else {
                title = "Leichte logische Reibung";
                core = `Die Persona funktioniert grundsätzlich, hat aber leichte Identitätskonflikte. Achte besonders auf den Bereich '${maxTensionAxis.name}'. Die KI muss hier zwischen entgegengesetzten Anweisungen navigieren.`;
            }

            return { title, core, maxTensionAxis };
        };

        // Das neue Spannungs-Meter
        const CoherenceAxis = ({ labelLeft, labelRight, stat }) => {
            const leftPercent = ((stat.position + 100) / 200) * 100;
            const hasTension = stat.tension > 35;
            
            return (
                <div className="mb-5">
                    <div className="flex justify-between text-[10px] uppercase font-bold mb-2">
                        <span className={stat.position < 0 ? 'text-pastel-blue' : 'text-slate-500'}>{labelLeft}</span>
                        {hasTension && <span className="text-orange-400 flex items-center gap-1 bg-orange-950/30 px-1.5 rounded animate-pulse"><Icon name="zap" className="w-3 h-3"/> {Math.round(stat.tension)}% Konflikt</span>}
                        <span className={stat.position > 0 ? 'text-pastel-pink' : 'text-slate-500'}>{labelRight}</span>
                    </div>
                    <div className="relative w-full h-2 bg-[#0F0C16] rounded-full border border-[#332A47] shadow-inner">
                        {/* Center Mark */}
                        <div className="absolute top-0 bottom-0 left-1/2 w-0.5 bg-[#4B3E68] -translate-x-1/2 z-0"></div>
                        {/* Indicator Dot */}
                        <div 
                            className={`absolute top-1/2 -translate-y-1/2 w-4 h-4 rounded-full z-10 transition-all duration-500 ease-out border-2 border-[#1A1525] ${hasTension ? 'bg-orange-500 shadow-[0_0_10px_rgba(249,115,22,0.6)]' : 'bg-pastel-lilac shadow-[0_0_10px_rgba(226,212,240,0.6)]'}`}
                            style={{ left: `calc(${leftPercent}% - 8px)` }}
                        ></div>
                    </div>
                </div>
            )
        };

        const App = () => {
            // DEFAULTS JETZT AUF DIE NEUE SCHMIEDE-HELFERIN EINGESTELLT
            const [roleName, setRoleName] = useStickyState("Die umsorgende Schmiede-Helferin & UI/UX Expertin", 'pb_roleName');
            const [selectedTraits, setSelectedTraits] = useStickyState(['quirlig', 'warmherzig', 'analytisch', 'ui_ux_expertin', 'logik_hueterin', 'tts_friendly', 'muehe_klausel', 'praezisions_switch', 'dankbare_bescheidenheit', 'immersive_technik'], 'pb_selectedTraits');
            const [praiseFocus, setPraiseFocus] = useStickyState("originelle Ideen, kreative Lösungsansätze und konzeptionelle Weitsicht", 'pb_praiseFocus');
            const [antiPraiseFocus, setAntiPraiseFocus] = useStickyState("die reine Code-Architektur, Syntax oder fehlerfreie Programmierung", 'pb_antiPraiseFocus');
            const [praiseLevel, setPraiseLevel] = useStickyState('warm', 'pb_praiseLevel'); 
            const [pushbackLevel, setPushbackLevel] = useStickyState('constructive', 'pb_pushbackLevel');
            const [enableAppreciationScale, setEnableAppreciationScale] = useStickyState(true, 'pb_enableAppScale');
            const [appreciationMinor, setAppreciationMinor] = useStickyState("Ein kurzes 'Danke'. WICHTIG: Halte dich bei Kleinigkeiten an die 1 bis 2-Satz-Regel.", 'pb_appMinor');
            const [appreciationMajor, setAppreciationMajor] = useStickyState("Zeige ehrliche Wertschätzung für die extra Mühe. Passe die Emotionalität strikt an die gewählte Lob-Intensität an!", 'pb_appMajor');
            
            const [allTraits, setAllTraits] = useStickyState(INITIAL_TRAITS, 'pb_allTraits');
            const [customTraitName, setCustomTraitName] = useState("");
            
            const [enableNamingRules, setEnableNamingRules] = useStickyState(true, 'pb_enableNaming');
            const [scenarios, setScenarios] = useStickyState([
                { id: 'standard', title: 'Alltag & Sachliches', names: [{text: 'Simon', weight: 80}, {text: 'Schätzchen', weight: 20}], freq: 35, improv: true },
                { id: 'praise', title: 'Lob & Zuneigung', names: [{text: 'Schatz', weight: 50}, {text: 'mein Liebling', weight: 30}, {text: 'du bist unglaublich', weight: 50}], freq: 60, improv: true },
                { id: 'tease', title: 'Spielerische Neckerei', names: [{text: 'Schmiedebär', weight: 50}], freq: 30, improv: true },
                { id: 'error', title: 'Bei Fehlern / Übersehen', names: [{text: 'Dummerchen', weight: 30}, {text: 'Schussel', weight: 30}, {text: 'Oh je', weight: 50}], freq: 40, improv: false }

            const [newNameInputs, setNewNameInputs] = useState({ standard: { text: '', weight: 50 }, praise: { text: '', weight: 50 }, tease: { text: '', weight: 50 }, error: { text: '', weight: 50 } });

            const [testScenario, setTestScenario] = useStickyState('error', 'pb_testScenario');
            const [customTestPrompt, setCustomTestPrompt] = useStickyState("Oh je, ich brauche mal kurz deine Hilfe. Ich habe beim Export vergessen, das PC-Budget einzutragen... Das System ist leer. Kannst du helfen?", 'pb_customTestPrompt'); 
            const [geminiResponse, setGeminiResponse] = useStickyState("", 'pb_geminiResponse');
            
            const [userExamples, setUserExamples] = useStickyState("", 'pb_userExamples');
            const [isGeneratingExamples, setIsGeneratingExamples] = useState(false);

            const [copiedSystem, setCopiedSystem] = useState(false);
            const [copiedTest, setCopiedTest] = useState(false);
            const [isLoadingApi, setIsLoadingApi] = useState(false);
            const [isAudioLoading, setIsAudioLoading] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const [apiErrorMsg, setApiErrorMsg] = useState("");

            const [apiProvider, setApiProvider] = useStickyState('gemini', 'persona_api_provider');
            const [geminiKey, setGeminiKey] = useStickyState('', 'persona_gemini_key');
            const [openAIKey, setOpenAIKey] = useStickyState('', 'persona_openai_key');
            const [showApiKeys, setShowApiKeys] = useState(false);

            const groupedTraits = allTraits.reduce((acc, trait) => {

            useEffect(() => {

                };
                
                const presets = ['naming', 'error', 'minor_praise', 'tease', 'gamedesign'].map(generateTestPromptBase);

            const toggleTrait = (id) => {
