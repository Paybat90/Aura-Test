                                                        checked={conflict.decision === 'both'} 
                                                        onChange={() => {
                                                            const newC = [...importConflicts];
                                                            newC[i].decision = 'both';
                                                            setImportConflicts(newC);
                                                        }} 
                                                        className="accent-blue-500"
                                                    /> Beide behalten
                                                </label>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="flex justify-between items-center mt-4 pt-4 border-t border-forge-700">
                                    <button onClick={cancelImport} className="px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-forge-700 transition-colors">Abbrechen</button>
                                    <button onClick={applyImportResolution} className="flex items-center gap-2 bg-green-700 hover:bg-green-600 text-white px-6 py-2.5 rounded-lg text-sm font-bold transition-colors shadow-lg">
                                        <IconCheck /> Import abschließen
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PASTE MODAL */}
                    {showPasteModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[150] p-4 animate-[fadeIn_0.2s_ease-in-out]">
                            <div className="bg-forge-800 border border-forge-700 rounded-xl p-6 max-w-3xl w-full shadow-2xl relative flex flex-col">
                                <button onClick={() => setShowPasteModal(false)} className="absolute top-4 right-4 text-gray-400 hover:text-white"><IconClose /></button>
                                <h3 className="text-xl font-bold text-forge-light mb-2 flex items-center gap-2"><IconClipboard /> JSON-Daten einfügen</h3>
                                <p className="text-sm text-gray-400 mb-4">Aufgrund von Browser-Sicherheitsrichtlinien ist das direkte Auslesen der Zwischenablage hier nicht erlaubt. Bitte füge deine kopierten JSON-Daten (Strg+V / Cmd+V) manuell in das Textfeld unten ein.</p>
                                <textarea
                                    value={pasteText}
                                    onChange={(e) => setPasteText(e.target.value)}
                                    className="w-full h-64 bg-forge-900 border border-forge-700 rounded-lg p-3 text-sm focus:outline-none focus:border-forge-accent text-gray-300 resize-none custom-scrollbar shadow-inner mb-4 font-mono whitespace-pre"
                                    placeholder="[{&#10;  &quot;id&quot;: &quot;m142&quot;,&#10;  &quot;name&quot;: &quot;des Kometen&quot;&#10;}]"
                                />
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setShowPasteModal(false)} className="px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-forge-700 transition-colors">Abbrechen</button>
                                    <button onClick={processPasteJSON} className="flex items-center gap-2 bg-forge-accent hover:bg-amber-500 text-forge-900 px-6 py-2 rounded-lg text-sm font-bold transition-colors shadow-lg">
                                        <IconCheck /> Daten übernehmen
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PROMPT EDITOR MODAL */}
                    {showPromptModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[250] p-4 animate-[fadeIn_0.2s_ease-in-out]">
                            <div className="bg-forge-800 border border-forge-700 rounded-xl p-4 sm:p-6 w-[98vw] max-w-4xl shadow-2xl relative flex flex-col h-[80vh]">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-xl font-bold text-forge-accent flex items-center gap-2">
                                        <IconMessageSquare /> KI-Prompt anpassen
                                    </h3>
                                    <button onClick={() => setShowPromptModal(false)} className="text-gray-400 hover:text-white transition-colors p-1"><IconClose /></button>
                                </div>
                                <p className="text-sm text-gray-400 mb-4 pb-4 border-b border-forge-700">
                                    Bearbeite die Systemanweisungen für die KI. Passe Regeln, Kontext und Anforderungen nach Belieben an. <br />
                                    <span className="text-red-400 font-bold mt-1 inline-block">WICHTIG: Das JSON-Strukturschema am Ende darf nicht kaputt gemacht werden, da sonst das Skript die Ergebnisse nicht mehr verarbeiten kann!</span>
                                </p>

                                <textarea
                                    value={tempPrompt}
                                    onChange={(e) => setTempPrompt(e.target.value)}
                                    className="flex-1 bg-forge-900 border border-forge-700 rounded-lg p-4 text-sm focus:outline-none focus:border-forge-accent text-gray-300 resize-none custom-scrollbar shadow-inner mb-4 font-mono leading-relaxed"
                                    placeholder="Dein System-Prompt..."
                                />

                                <div className="flex justify-between items-center pt-4 border-t border-forge-700">
                                    <button 
                                        onClick={() => setTempPrompt(DEFAULT_AI_PROMPT)} 
                                        className="px-4 py-2 rounded-lg text-sm font-medium text-amber-500 hover:text-white hover:bg-amber-900/50 border border-amber-900/50 transition-colors"
                                    >
                                        Standard wiederherstellen
                                    </button>
                                    <div className="flex gap-3">
                                        <button onClick={() => setShowPromptModal(false)} className="px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-forge-700 transition-colors">Abbrechen</button>
                                        <button 
                                            onClick={() => {
                                                setSystemPrompt(tempPrompt);
                                                setShowPromptModal(false);
                                                setGlobalSuccess("KI-System-Prompt erfolgreich gespeichert!");
                                            }} 
                                            className="flex items-center gap-2 bg-forge-accent hover:bg-amber-500 text-forge-900 px-6 py-2.5 rounded-lg text-sm font-bold transition-colors shadow-lg"
                                        >
                                            <IconCheck /> Speichern
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* BATCH PROGRESS OVERLAY */}
                    {batchProgress && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-4">
                            <div className="bg-forge-800 p-6 rounded-xl border border-forge-700 shadow-2xl flex flex-col items-center max-w-md w-full text-center">
                                <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <h3 className="text-2xl font-bold text-forge-light mb-2">KI-Massenüberprüfung</h3>
                                <p className="text-sm text-gray-400 mb-6">Bitte schließe das Fenster nicht. Die KI analysiert gerade die ausgewählten Einträge.</p>
                                
                                <div className="w-full bg-forge-900 rounded-full h-3 mb-2 border border-forge-700 overflow-hidden">
                                    <div className="bg-blue-500 h-3 rounded-full transition-all duration-500 relative overflow-hidden" style={{ width: `${(batchProgress.current / batchProgress.total) * 100}%` }}>
                                        <div className="absolute inset-0 bg-white/20 animate-pulse"></div>
                                    </div>
                                </div>
                                
                                <div className="flex justify-between w-full text-xs text-gray-400 font-mono mb-4">
                                    <span>Eintrag {batchProgress.current} von {batchProgress.total}</span>
                                    <span>{Math.round((batchProgress.current / batchProgress.total) * 100)}%</span>
                                </div>

                                <div className="bg-forge-900 border border-forge-700 p-3 rounded-lg w-full text-left">
                                    <span className="text-[10px] text-gray-500 uppercase tracking-wider block mb-1">Aktuelles Item:</span>
                                    <span className="text-sm text-blue-300 font-bold truncate block">{batchProgress.itemName}</span>
                                </div>

                                <button onClick={() => { cancelBatchRef.current = true; setBatchProgress(null); }} className="mt-6 text-xs text-gray-500 hover:text-red-400 underline transition-colors">Abbrechen</button>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="bg-forge-800 border-b border-forge-700 p-3 sm:p-4 sticky top-0 z-30 shadow-md">
                        <div className="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-3">
                            <div className="flex items-center gap-2 sm:gap-3 flex-1 sm:flex-none min-w-0">
                                <div className="w-8 h-8 sm:w-10 sm:h-10 bg-forge-900 rounded-full flex items-center justify-center border-2 border-forge-accent text-forge-accent flex-shrink-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
                                </div>
                                <div className="min-w-0 truncate">
                                    <h1 className="text-base sm:text-xl font-bold text-forge-light truncate">Schmiede-Meister</h1>
                                    <p className="text-[10px] sm:text-xs text-gray-400">{data.length} Einträge (JSON)</p>
                                </div>
                            </div>
                            
                            <button onClick={() => setShowMobileSettings(!showMobileSettings)} className="sm:hidden p-2 text-gray-400 hover:text-forge-accent"><IconSettings /></button>

                            <div className="flex bg-forge-900 rounded-lg p-1 border border-forge-700 w-full sm:w-auto overflow-x-auto custom-scrollbar">
                                <button onClick={() => changeTab('dashboard')} className={`px-3 py-1.5 sm:px-4 sm:py-2 rounded-md text-xs sm:text-sm font-medium transition-colors whitespace-nowrap ${activeTab === 'dashboard' ? 'bg-forge-accent text-forge-900' : 'text-gray-400 hover:text-white'}`}>Balancing & Übersicht</button>
                                <button onClick={() => changeTab('table')} className={`px-3 py-1.5 sm:px-4 sm:py-2 rounded-md text-xs sm:text-sm font-medium transition-colors whitespace-nowrap ${activeTab === 'table' ? 'bg-forge-accent text-forge-900' : 'text-gray-400 hover:text-white'}`}>Daten-Tabelle</button>
                            </div>

                            <div className="hidden sm:flex items-center gap-4 ml-auto">
                                {/* API Provider Selection */}
                                <div className="flex items-center gap-2 bg-forge-900 border border-forge-700 rounded-lg px-2 sm:px-3 py-1.5">
                                    <span className="text-[10px] sm:text-xs text-gray-400 hidden lg:inline">KI:</span>
                                    <select 
                                        value={apiProvider} 
                                        onChange={(e) => { 
                                            setApiProvider(e.target.value); 
                                            localStorage.setItem('dnd_api_provider', e.target.value); 
                                        }} 
                                        className="bg-transparent text-xs sm:text-sm font-bold focus:outline-none focus:text-forge-accent text-white"
                                    >
                                        <option value="openai">OpenAI (ChatGPT)</option>
                                        <option value="gemini">Google Gemini</option>
                                    </select>
                                </div>

                                {/* Dynamic API Inputs */}
                                {apiProvider === 'gemini' ? (
                                    <>
                                        <div className="flex items-center gap-2 bg-forge-900 border border-forge-700 rounded-lg px-2 sm:px-3 py-1.5" title="Google Gemini API Key">
                                            <IconSparkles />
                                            <input type="password" placeholder="Gemini API Key..." value={geminiKey} onChange={(e) => { setGeminiKey(e.target.value); localStorage.setItem('dnd_gemini_key', e.target.value); }} className="bg-transparent text-xs sm:text-sm focus:outline-none focus:text-forge-accent text-white w-24 sm:w-32 lg:w-48 placeholder-gray-600"/>
                                        </div>
                                        <div className="flex items-center gap-2 bg-forge-900 border border-forge-700 rounded-lg px-2 sm:px-3 py-1.5">
                                            <select value={geminiModel} onChange={(e) => { setGeminiModel(e.target.value); localStorage.setItem('dnd_gemini_model', e.target.value); }} className="bg-transparent text-xs sm:text-sm focus:outline-none focus:text-forge-accent text-white">
                                                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                                <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                                                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                            </select>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div className="flex items-center gap-2 bg-forge-900 border border-forge-700 rounded-lg px-2 sm:px-3 py-1.5" title="OpenAI API Key">
                                            <IconBrain />
                                            <input type="password" placeholder="OpenAI API Key (sk-...)" value={openAiKey} onChange={(e) => { setOpenAiKey(e.target.value); localStorage.setItem('dnd_openai_key', e.target.value); }} className="bg-transparent text-xs sm:text-sm focus:outline-none focus:text-emerald-400 text-white w-24 sm:w-32 lg:w-48 placeholder-gray-600" />
                                        </div>
                                        <div className="flex items-center gap-2 bg-forge-900 border border-forge-700 rounded-lg px-2 sm:px-3 py-1.5">
                                            <select value={openAiModel} onChange={(e) => { setOpenAiModel(e.target.value); localStorage.setItem('dnd_openai_model', e.target.value); }} className="bg-transparent text-xs sm:text-sm focus:outline-none focus:text-emerald-400 text-white">
                                                <option value="gpt-4o-mini">GPT-4o Mini</option>
                                                <option value="gpt-4o">GPT-4o</option>
                                            </select>
                                        </div>
                                    </>
                                )}

                                <button onClick={handleExportOrShare} className="flex items-center gap-2 bg-green-700 hover:bg-green-600 text-white px-3 sm:px-4 py-1.5 sm:py-2 rounded-md text-xs sm:text-sm font-medium transition-colors shadow-lg">
                                    {canShareFiles ? <IconShare /> : <IconDownload />}
                                    <span className="hidden lg:inline">{canShareFiles ? 'JSON Speichern' : 'JSON Export'}</span>
                                </button>
                                {/* Der ID-Scanner Button */}
                                <button 
                                    onClick={handleRepairIds}
                                    className="flex items-center gap-2 px-3 sm:px-4 py-1.5 sm:py-2 bg-forge-900 border border-forge-600 hover:bg-forge-700 text-white rounded-md shadow-lg transition-all font-bold text-xs sm:text-sm"
                                    title="IDs auf Basis der Kategorien prüfen und neu durchnummerieren"
                                >
                                    <IconWrench /> ID-Scanner
                                </button>
                                {/* Der Migrations Button */}
                                <button 
                                    onClick={handleMigrationExport}
                                    className="flex items-center gap-2 px-3 sm:px-4 py-1.5 sm:py-2 bg-gradient-to-r from-emerald-600 to-emerald-800 hover:from-emerald-500 hover:to-emerald-700 text-white rounded-md shadow-lg shadow-emerald-900/50 transition-all font-bold text-xs sm:text-sm"
                                    title="Datenbank auf V2 patchen"
                                >
                                    <IconCheck /> V2.0 Patcher
                                </button>
                            </div>
                        </div>

                        {showMobileSettings && (
                            <div className="sm:hidden mt-3 p-3 bg-forge-900 border border-forge-700 rounded-lg flex flex-col gap-3 animate-[fadeIn_0.2s_ease-in-out]">
                                <div className="flex justify-between items-center pb-2 border-b border-forge-700">
                                    <span className="text-sm text-gray-400">KI-Anbieter:</span>
                                    <select 
                                        value={apiProvider} 
                                        onChange={(e) => { setApiProvider(e.target.value); localStorage.setItem('dnd_api_provider', e.target.value); }} 
                                        className="bg-transparent text-sm font-bold focus:outline-none focus:text-forge-accent text-white text-right"
                                    >
                                        <option value="openai">OpenAI (ChatGPT)</option>
                                        <option value="gemini">Google Gemini</option>
                                    </select>
                                </div>
                                
                                {apiProvider === 'gemini' ? (
                                    <>
                                        <div className="flex items-center gap-2 border-b border-forge-700 pb-2">
                                            <IconSparkles />
                                            <input type="password" placeholder="Gemini API Key..." value={geminiKey} onChange={(e) => { setGeminiKey(e.target.value); localStorage.setItem('dnd_gemini_key', e.target.value); }} className="bg-transparent text-sm focus:outline-none focus:text-forge-accent text-white w-full placeholder-gray-600" />
                                        </div>
                                        <div className="flex justify-between items-center pb-2 border-b border-forge-700">
                                            <span className="text-sm text-gray-400">Modell:</span>
                                            <select value={geminiModel} onChange={(e) => { setGeminiModel(e.target.value); localStorage.setItem('dnd_gemini_model', e.target.value); }} className="bg-transparent text-sm focus:outline-none focus:text-forge-accent text-white text-right">
                                                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                                <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                                                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                            </select>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div className="flex items-center gap-2 border-b border-forge-700 pb-2">
                                            <IconBrain />
                                            <input type="password" placeholder="OpenAI API Key (sk-...)" value={openAiKey} onChange={(e) => { setOpenAiKey(e.target.value); localStorage.setItem('dnd_openai_key', e.target.value); }} className="bg-transparent text-sm focus:outline-none focus:text-emerald-400 text-white w-full placeholder-gray-600" />
                                        </div>
                                        <div className="flex justify-between items-center pb-2 border-b border-forge-700">
                                            <span className="text-sm text-gray-400">Modell:</span>
                                            <select value={openAiModel} onChange={(e) => { setOpenAiModel(e.target.value); localStorage.setItem('dnd_openai_model', e.target.value); }} className="bg-transparent text-sm focus:outline-none focus:text-emerald-400 text-white text-right">
                                                <option value="gpt-4o-mini">GPT-4o Mini</option>
                                                <option value="gpt-4o">GPT-4o</option>
                                            </select>
                                        </div>
                                    </>
                                )}

                                <button onClick={handleExportOrShare} className="flex items-center justify-center gap-2 bg-green-700 active:bg-green-600 text-white px-4 py-2.5 rounded-md text-sm font-bold w-full shadow-lg mb-2">
                                    {canShareFiles ? <IconShare /> : <IconDownload />} JSON Exportieren
                                </button>
                                <button onClick={handleRepairIds} className="flex items-center justify-center gap-2 bg-forge-900 border border-forge-600 text-white px-4 py-2.5 rounded-md text-sm font-bold w-full shadow-lg mb-2">
                                    <IconWrench /> ID-Scanner
                                </button>
                                <button onClick={handleMigrationExport} className="flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-600 to-emerald-800 text-white px-4 py-2.5 rounded-md text-sm font-bold w-full shadow-lg">
                                    <IconCheck /> V2.0 Patcher
                                </button>
                            </div>
                        )}
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 p-2 sm:p-4 md:p-6 mx-auto w-full flex flex-col min-h-0">
                        
                        {/* TAB: DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="max-w-7xl mx-auto space-y-4 sm:space-y-6 animate-[fadeIn_0.3s_ease-in-out]">
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-4">
                                    <div className="bg-forge-800 p-3 sm:p-4 rounded-xl border border-forge-700 shadow-lg">
                                        <h3 className="text-gray-400 text-[10px] sm:text-sm font-semibold mb-1 truncate">Einträge (Bausteine)</h3>
                                        <p className="text-xl sm:text-3xl font-bold text-forge-light">{dashboardData.length}</p>
                                    </div>
                                    <div className="bg-forge-800 p-3 sm:p-4 rounded-xl border border-forge-700 shadow-lg">
                                        <h3 className="text-gray-400 text-[10px] sm:text-sm font-semibold mb-1 truncate">Geprüft (Checked)</h3>
                                        <p className="text-xl sm:text-3xl font-bold text-emerald-400">{dashboardData.filter(d => String(d.manually_checked).toLowerCase() === 'true').length}</p>
                                    </div>
                                    <div className="bg-forge-800 p-3 sm:p-4 rounded-xl border border-forge-700 shadow-lg">
                                        <h3 className="text-gray-400 text-[10px] sm:text-sm font-semibold mb-1 truncate">Einzigartige Tags</h3>
                                        <p className="text-xl sm:text-3xl font-bold text-cyan-400">{uniqueTags.length}</p>
                                    </div>
                                    <div className="bg-forge-800 p-3 sm:p-4 rounded-xl border border-forge-700 shadow-lg">
                                        <h3 className="text-gray-400 text-[10px] sm:text-sm font-semibold mb-1 truncate">Tradeoffs</h3>
                                        <p className="text-xl sm:text-3xl font-bold text-red-400">{dashboardData.filter(d => String(d.is_tradeoff).trim().toLowerCase() === 'true').length}</p>
                                    </div>
                                </div>

                                {/* OBERE REIHE: PC Kurve & Action Economy */}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
                                    <div className="bg-forge-800 p-3 sm:p-4 rounded-xl border border-forge-700 shadow-lg flex flex-col lg:col-span-2">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="text-base sm:text-lg font-bold text-forge-light hover:text-blue-400 cursor-pointer transition-colors" onClick={() => {setSearchTerm(''); setSortConfig({key: 'power_cost', direction: 'desc'}); changeTab('table');}}>Machtkosten-Kurve (Power Cost)</h3>
                                            </div>
                                            <IconBolt className="text-blue-400 opacity-50" />
                                        </div>
                                        <div className="flex-1 min-h-[160px] relative">
                                            {chartDataPC && <ChartComponent type="line" data={chartDataPC} options={lineBarOptions} onChartClick={(label) => handleChartClick(label, 'pc')} />}
                                        </div>
                                    </div>

                                    <div className="bg-forge-800 p-3 sm:p-4 rounded-xl border border-forge-700 shadow-lg flex flex-col">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="text-base sm:text-lg font-bold text-forge-light hover:text-amber-400 cursor-pointer transition-colors" onClick={() => {setSearchTerm(''); setSortConfig({key: 'tags_zeitaufwand', direction: 'desc'}); changeTab('table');}}>Action Economy</h3>
                                            </div>
                                            <IconClock className="text-amber-400 opacity-50" />
                                        </div>
                                        <div className="flex-1 min-h-[160px] relative flex justify-center">
                                            {chartDataActionEconomy && <ChartComponent type="doughnut" data={chartDataActionEconomy} options={{...pieOptions, cutout: '60%'}} onChartClick={(label) => handleChartClick(label, 'action')} />}
                                        </div>
                                    </div>
                                </div>

                                {/* UNTERE REIHE: Motivation, Themen, Bausteine */}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
                                    <div className="bg-forge-800 p-3 sm:p-4 rounded-xl border border-forge-700 shadow-lg flex flex-col">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="text-base sm:text-lg font-bold text-forge-light hover:text-purple-400 cursor-pointer transition-colors" onClick={() => {setSearchTerm(''); setSortConfig({key: 'tags_motivator', direction: 'desc'}); changeTab('table');}}>Motivatoren</h3>
                                            </div>
                                            <IconTarget className="text-purple-400 opacity-50" />
                                        </div>
                                        <div className="flex-1 min-h-[160px] relative">
                                            {chartDataMotivator && <ChartComponent type="radar" data={chartDataMotivator} options={radarOptions} onChartClick={(label) => handleChartClick(label, 'motivator')} />}
                                        </div>
                                    </div>

                                    <div className="bg-forge-800 p-3 sm:p-4 rounded-xl border border-forge-700 shadow-lg flex flex-col">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="text-base sm:text-lg font-bold text-forge-light hover:text-red-400 cursor-pointer transition-colors" onClick={() => {setSearchTerm(''); setSortConfig({key: 'tags_thema', direction: 'desc'}); changeTab('table');}}>Themen & Elemente</h3>
                                            </div>
                                            <IconFlame className="text-red-400 opacity-50" />
                                        </div>
                                        <div className="flex-1 min-h-[160px] relative">
                                            {chartDataThema && <ChartComponent type="bar" data={chartDataThema} options={lineBarOptions} onChartClick={(label) => handleChartClick(label, 'thema')} />}
                                        </div>
                                    </div>

                                    <div className="bg-forge-800 p-3 sm:p-4 rounded-xl border border-forge-700 shadow-lg flex flex-col">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="text-base sm:text-lg font-bold text-forge-light hover:text-cyan-400 cursor-pointer transition-colors" onClick={() => {setSearchTerm(''); setSortConfig({key: 'category', direction: 'asc'}); changeTab('table');}}>Baustein-Kategorien</h3>
                                            </div>
                                            <IconFilter className="text-cyan-400 opacity-50" />
                                        </div>
                                        <div className="flex-1 min-h-[160px] relative flex justify-center">
                                            {chartDataCategory && <ChartComponent type="pie" data={chartDataCategory} options={{...pieOptions, cutout: '0%'}} onChartClick={(label) => handleChartClick(label, 'category')} />}
                                        </div>
                                        <div className="flex flex-wrap gap-1 mt-3 justify-center border-t border-forge-700/50 pt-2">
                                            {uniqueDashboardCategories.map(cat => {
                                                const isExcluded = excludedCategories.includes(cat);
                                                return (
                                                    <button 
                                                        key={cat}
                                                        onClick={() => setExcludedCategories(prev => isExcluded ? prev.filter(c => c !== cat) : [...prev, cat])}
                                                        className={`text-[9px] px-1.5 py-0.5 rounded border transition-colors ${isExcluded ? 'bg-forge-900 border-forge-700 text-gray-600 line-through' : 'bg-cyan-900/30 border-cyan-800 text-cyan-300 hover:bg-cyan-900/50'}`}
                                                        title={isExcluded ? "Im Diagramm einblenden" : "Aus Diagramm ausschließen"}
                                                    >
                                                        {cat}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                </div>
                                
                                {/* NEU: Kombinations-Übersicht für Adjektive & Eigennamen (Relikt-Vorschau) */}
                                <div className="bg-forge-800 p-4 sm:p-6 rounded-xl border border-forge-700 shadow-lg flex flex-col xl:flex-row gap-6">
                                    <div className="flex-1 overflow-hidden flex flex-col">
                                        <div className="flex items-center gap-2 mb-4 flex-shrink-0">
                                            <IconLink className="text-indigo-400" />
                                            <h3 className="text-lg sm:text-xl font-bold text-indigo-300">Relikt-Kombinationen (Matchmaking Finder)</h3>
                                        </div>
                                        <p className="text-sm text-gray-400 mb-6 flex-shrink-0">
                                            Diese Liste zeigt alle Adjektive und Eigennamen sortiert nach der Anzahl der möglichen Merkmale, mit denen sie im Generator kombiniert werden können. Die Liste basiert exklusiv auf gemeinsamen <b className="text-gray-200">Themen</b> oder <b className="text-gray-200">Allgemeinen Tags</b>. Klicke auf einen Namen, um ihn und seine Merkmale in der Tabelle zu filtern.
                                        </p>
                                        
                                        <div className="overflow-y-auto max-h-[400px] custom-scrollbar pr-2 space-y-2 flex-1">
                                            {prefixSuffixCombinations.map(combo => (
                                                <div 
                                                    key={combo.id}
                                                    onClick={() => handleCombinationClick(combo)}
                                                    className="bg-forge-900 border border-forge-700 p-3 rounded-lg flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 cursor-pointer hover:bg-forge-700 hover:border-indigo-500 transition-all group"
                                                >
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <h4 className="font-bold text-forge-light group-hover:text-indigo-300 transition-colors">{combo.name}</h4>
                                                            <span className={`text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded font-bold ${normalizeStr(combo.category).includes('praefix') || normalizeStr(combo.category).includes('präfix') || normalizeStr(combo.category).includes('adjektiv') ? 'bg-cyan-900/50 text-cyan-300 border border-cyan-800' : 'bg-purple-900/50 text-purple-300 border border-purple-800'}`}>
                                                                {combo.category}
                                                            </span>
                                                        </div>
                                                        <div className="flex flex-wrap gap-1 mt-2">
                                                            {combo.matchTagsArr.length > 0 ? combo.matchTagsArr.map((t, i) => (
                                                                <span key={i} className="text-[10px] px-1.5 py-0.5 rounded border border-gray-600 bg-gray-800 text-gray-300 shadow-sm">{t}</span>
                                                            )) : <span className="text-xs text-red-400 italic">Keine relevanten Match-Tags vergeben</span>}
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="flex flex-col items-end flex-shrink-0 bg-forge-950 p-2 rounded border border-forge-800">
                                                        <span className="text-[10px] text-gray-500 uppercase font-bold tracking-widest mb-1">Teilt Tags mit</span>
                                                        <div className="flex items-center gap-1.5">
                                                            <span className="text-2xl font-bold text-emerald-400 leading-none">{combo.matchingIds.length}</span>
                                                            <span className="text-sm text-gray-400">Merkmalen</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            {prefixSuffixCombinations.length === 0 && (
                                                <div className="text-center p-6 text-gray-500 italic border border-dashed border-forge-700 rounded-lg">
                                                    Keine Adjektive oder Eigennamen gefunden.
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className="w-full xl:w-72 flex-shrink-0 bg-forge-900 border border-forge-700 p-4 rounded-xl flex flex-col max-h-[500px] overflow-hidden">
                                        <h4 className="text-sm font-bold text-red-400 mb-2 flex items-center gap-2 flex-shrink-0"><IconAlert /> Isolierte Tags</h4>
                                        <p className="text-xs text-gray-400 mb-4 flex-shrink-0">
                                            Diese <b>Themen- oder Allgemeinen Tags</b> kommen in Merkmalen vor, aber in keinem Adjektiv/Eigennamen. Es können dafür keine Relikte gebildet werden! Klicke auf einen Tag, um die betroffenen Merkmale zu filtern.
                                        </p>
                                        <div className="flex flex-wrap gap-1.5 overflow-y-auto custom-scrollbar flex-1 items-start content-start">
                                            {visibleUnmatchedTags.map(tag => (
                                                <div key={tag} className="flex items-center bg-red-900/30 border border-red-800 rounded overflow-hidden group">
                                                    <span 
                                                        className="text-[11px] px-2 py-1 text-red-300 cursor-pointer hover:bg-red-900/50 hover:text-white transition-colors" 
                                                        onClick={() => { setTagFilterMode({ [tag]: 'include' }); setSortConfig({ key: 'wert', direction: 'desc' }); changeTab('table'); }}
                                                        title="In Tabelle filtern"
                                                    >
                                                        {tag}
                                                    </span>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); setHiddenIsolatedTags([...hiddenIsolatedTags, tag]); }}
                                                        className="px-1.5 py-1 hover:bg-red-800 text-red-400 hover:text-white transition-colors border-l border-red-800/50"
                                                        title="Diesen Tag ausblenden"
                                                    >
                                                        &times;
                                                    </button>
                                                </div>
                                            ))}
                                            {visibleUnmatchedTags.length === 0 && (
                                                <span className="text-xs text-emerald-400 italic flex items-center gap-1 p-2 bg-emerald-900/20 border border-emerald-900/50 rounded w-full">
                                                    <IconCheck /> Alle Merkmal-Tags sind abgedeckt!
                                                </span>
                                            )}
                                        </div>
                                        {hiddenIsolatedTags.length > 0 && (
                                            <button onClick={() => setHiddenIsolatedTags([])} className="mt-3 text-[10px] text-gray-500 hover:text-gray-300 underline text-center w-full flex-shrink-0">
                                                {hiddenIsolatedTags.length} ausgeblendete Tags wiederherstellen
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB: TABLE */}
                        {activeTab === 'table' && (
                            <div className="flex flex-col flex-1 min-h-[500px] w-full animate-[fadeIn_0.3s_ease-in-out]">
                                <datalist id="category-options">{uniqueCategories.map(c => <option key={c} value={c} />)}</datalist>
                                <datalist id="type-options">{uniqueTypes.map(c => <option key={c} value={c} />)}</datalist>
                                
                                {/* Info Banner for Combination Filter */}
                                {combinationFilterIds && (
                                    <div className="bg-indigo-900/30 border border-indigo-500/50 text-indigo-300 p-3 rounded-lg flex justify-between items-center mb-4 shadow-md animate-[fadeIn_0.2s_ease-in-out]">
                                        <div className="flex items-center gap-2">
                                            <IconLink />
                                            <span className="font-medium text-sm">Zeige exklusive Baustein-Kombinationen an ({combinationFilterIds.length} Treffer)</span>
                                        </div>
                                        <button 
                                            onClick={() => setCombinationFilterIds(null)} 
                                            className="bg-indigo-700 hover:bg-indigo-600 px-4 py-1.5 rounded-md text-white text-xs font-bold transition-colors shadow"
                                        >
                                            Filter aufheben
                                        </button>
                                    </div>
                                )}

                                <div className="bg-forge-800 p-2 sm:p-4 rounded-t-xl border border-forge-700 border-b-0 flex flex-col sm:flex-row flex-wrap gap-2 sm:gap-4 items-stretch sm:items-center w-full">
                                    <div className="flex gap-2 items-center">
                                        <button onClick={handleAddRow} className="flex-1 sm:flex-none flex justify-center items-center gap-2 bg-forge-accent hover:bg-amber-500 text-forge-900 px-3 sm:px-4 py-2 rounded-lg text-sm font-bold transition-colors shadow-lg">
                                            <IconPlus /><span className="hidden xs:inline">Neu</span>
                                        </button>
                                        <button onClick={handleTriggerImportFile} className="flex-1 sm:flex-none flex justify-center items-center gap-2 bg-indigo-800 hover:bg-indigo-700 text-indigo-100 border border-indigo-600 px-3 sm:px-4 py-2 rounded-lg text-sm font-bold transition-colors shadow-lg" title="JSON-Datei importieren und anhängen">
                                            <IconFilePlus /><span className="hidden xs:inline">Import</span>
                                        </button>
                                        <button onClick={triggerPaste} className="flex-1 sm:flex-none flex justify-center items-center gap-2 bg-forge-800 hover:bg-forge-700 text-forge-light border border-forge-600 px-3 sm:px-4 py-2 rounded-lg text-sm font-bold transition-colors shadow-lg" title="JSON-Daten aus der Zwischenablage anfügen">
                                            <IconClipboard /><span className="hidden xs:inline">Einfügen</span>
                                        </button>
                                        <button onClick={() => setShowTagFilters(!showTagFilters)} className={`flex-1 sm:flex-none flex justify-center items-center gap-1 sm:gap-2 px-3 py-2 rounded-lg text-xs sm:text-sm font-medium transition-colors border ${activeFiltersCount > 0 ? 'bg-indigo-900/50 border-indigo-500 text-indigo-300' : 'bg-forge-900 border-forge-700 text-gray-400 hover:text-white'}`}>
                                            <IconFilter />Tags {activeFiltersCount > 0 && `(${activeFiltersCount})`}
                                        </button>
                                        
                                        {/* COLUMN MANAGER TOGGLE */}
                                        <div className="relative" ref={colMenuRef}>
                                            <button onClick={() => setShowColumnMenu(!showColumnMenu)} className={`flex-1 sm:flex-none flex justify-center items-center gap-1 sm:gap-2 px-3 py-2 rounded-lg text-xs sm:text-sm font-medium transition-colors border ${showColumnMenu ? 'bg-forge-700 border-forge-500 text-white' : 'bg-forge-900 border-forge-700 text-gray-400 hover:text-white'}`}>
                                                <IconColumns /> Spalten
                                            </button>
                                            {showColumnMenu && (
                                                <div className="absolute top-full left-0 sm:left-auto sm:right-0 mt-2 bg-forge-800 border border-forge-700 rounded-lg shadow-xl p-3 z-50 w-56 flex flex-col gap-1">
                                                    <h4 className="text-forge-light font-bold text-sm mb-1">Spalten verwalten</h4>
                                                    <p className="text-[9px] text-gray-400 mb-2 leading-tight">Drag & Drop auf die Spaltenüberschriften in der Tabelle ändert die Reihenfolge.</p>
                                                    <div className="max-h-60 overflow-y-auto custom-scrollbar flex flex-col gap-1 pr-1">
                                                        {columns.map((col, idx) => (
                                                            <label key={col.key} className="flex items-center gap-2 text-xs text-gray-300 hover:bg-forge-900 p-1.5 rounded cursor-pointer select-none">
                                                                <input 
                                                                    type="checkbox" 
                                                                    checked={col.visible} 
                                                                    onChange={() => {
                                                                        const newCols = [...columns];
                                                                        newCols[idx].visible = !newCols[idx].visible;
                                                                        setColumns(newCols);
                                                                    }} 
                                                                    className="w-3 h-3 accent-forge-accent bg-forge-900 border-forge-700 cursor-pointer" 
                                                                />
                                                                {col.label}
                                                            </label>
                                                        ))}
                                                    </div>
                                                    <button onClick={() => setColumns(defaultColumns)} className="mt-2 pt-2 border-t border-forge-700 text-[10px] text-forge-accent hover:underline text-center w-full">Ansicht zurücksetzen</button>
                                                </div>
                                            )}
                                        </div>
                                        
                                        {/* BATCH SELECT TOGGLE */}
                                        <button 
                                            onClick={() => {
                                                setIsSelectionMode(!isSelectionMode);
                                                if (isSelectionMode) setSelectedIds([]); 
                                            }} 
                                            className={`flex-1 sm:flex-none flex justify-center items-center gap-1 sm:gap-2 px-3 py-2 rounded-lg text-xs sm:text-sm font-medium transition-colors border ${isSelectionMode ? 'bg-blue-900/50 border-blue-500 text-blue-300' : 'bg-forge-900 border-forge-700 text-gray-400 hover:text-white'}`}
                                        >
                                            <IconListCheck /> {isSelectionMode ? 'Auswahl beenden' : 'Massen-Check'}
                                        </button>

                                        {/* KI PROMPT EDITOR TOGGLE */}
                                        <button 
                                            onClick={() => {
                                                setTempPrompt(systemPrompt);
                                                setShowPromptModal(true);
                                            }} 
                                            className="flex-1 sm:flex-none flex justify-center items-center gap-1 sm:gap-2 px-3 py-2 rounded-lg text-xs sm:text-sm font-medium transition-colors border bg-forge-900 border-forge-700 text-gray-400 hover:text-white"
                                            title="KI-System Prompt bearbeiten"
                                        >
                                            <IconMessageSquare /> KI-Prompt
                                        </button>

                                        {isSelectionMode && selectedIds.length > 0 && (
                                            <>
                                                <button 
                                                    onClick={handleCopyJSON}
                                                    className="flex-1 sm:flex-none flex justify-center items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-3 sm:px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-lg animate-[fadeIn_0.2s_ease-in-out]"
                                                    title="Ausgewählte Einträge als JSON kopieren"
                                                >
                                                    <IconClipboard /> JSON Kopieren ({selectedIds.length})
                                                </button>
                                                <button 
                                                    onClick={handleBatchAnalysis}
                                                    className="flex-1 sm:flex-none flex justify-center items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-3 sm:px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-lg hover:glow-ai animate-[fadeIn_0.2s_ease-in-out]"
                                                >
                                                    <IconSparkles /> KI Starten ({selectedIds.length})
                                                </button>
                                            </>
                                        )}
                                    </div>

                                    <div className="relative flex-1 min-w-[150px]">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><IconSearch /></div>
                                        <input type="text" placeholder="Suchen (Name, ID, Desc)..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full bg-forge-900 border border-forge-700 rounded-lg pl-9 pr-3 py-2 text-sm focus:outline-none focus:border-forge-accent text-white" />
                                    </div>
                                    
                                    <div className="grid grid-cols-2 md:flex gap-2 sm:flex-none">
                                        <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)} className="w-full bg-forge-900 border border-forge-700 rounded-lg px-2 sm:px-4 py-2 text-xs sm:text-sm focus:outline-none focus:border-forge-accent text-white">
                                            <option value="all">Alle Kategorien</option>
                                            {uniqueCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <label className="flex items-center justify-center gap-2 text-xs sm:text-sm text-gray-400 cursor-pointer bg-forge-900 border border-forge-700 rounded-lg px-2 sm:px-4 py-2 hover:text-white transition-colors col-span-2 md:col-span-1">
                                            <input 
                                                type="checkbox" 
                                                checked={showItemsCategory} 
                                                onChange={(e) => setShowItemsCategory(e.target.checked)}
                                                className="w-4 h-4 rounded accent-forge-accent bg-forge-900 border-forge-700 cursor-pointer"
                                            />
                                            "Items" einblenden
                                        </label>
                                        <label className="flex items-center justify-center gap-2 text-xs sm:text-sm text-emerald-400 cursor-pointer bg-forge-900 border border-forge-700 rounded-lg px-2 sm:px-4 py-2 hover:text-emerald-300 transition-colors col-span-2 md:col-span-1">
                                            <input 
                                                type="checkbox" 
                                                checked={showRecentlyAdded} 
                                                onChange={(e) => setShowRecentlyAdded(e.target.checked)}
                                                className="w-4 h-4 rounded accent-emerald-500 bg-forge-900 border-forge-700 cursor-pointer"
                                                disabled={recentlyAddedIds.length === 0}
                                            />
                                            Zuletzt hinzugefügt
                                        </label>
                                    </div>
                                </div>

                                {showTagFilters && (
                                    <div className="bg-forge-900 p-3 sm:p-4 border-l border-r border-forge-700 flex flex-wrap gap-2 animate-[fadeIn_0.2s_ease-in-out] w-full">
                                        <div className="w-full text-[10px] sm:text-xs text-gray-400 mb-2 flex flex-col xs:flex-row justify-between gap-2">
                                            <span>Sucht global in allen drei Tag-Kategorien. Klick = <span className="text-green-400">Muss</span> | 2x Klick = <span className="text-red-400">Darf nicht</span></span>
                                            {activeFiltersCount > 0 && <button onClick={() => setTagFilterMode({})} className="text-forge-accent hover:underline self-start">Filter zurücksetzen</button>}
                                        </div>
                                        {uniqueTags.map(tag => {
                                            const mode = tagFilterMode[tag];
                                            let btnClass = "border-forge-700 text-gray-400 hover:bg-forge-800 hover:text-gray-200"; 
                                            if (mode === 'include') btnClass = "border-green-500 bg-green-900/30 text-green-300 shadow-[0_0_10px_rgba(34,197,94,0.2)]";
                                            if (mode === 'exclude') btnClass = "border-red-500 bg-red-900/30 text-red-300 shadow-[0_0_10px_rgba(239,68,68,0.2)] line-through";
                                            return (
                                                <button key={tag} onClick={() => toggleTagFilter(tag)} className={`px-2 py-1 sm:px-3 sm:py-1 rounded-full text-[10px] sm:text-xs font-semibold border transition-all flex items-center gap-1 select-none ${btnClass}`}>
                                                    {mode === 'include' && '+'}{mode === 'exclude' && '-'}{tag}
                                                </button>
                                            );
                                        })}
                                    </div>
                                )}

                                <div className="bg-forge-800 border border-forge-700 rounded-b-xl flex-1 flex flex-col relative min-h-[400px] w-full">
                                    <div className="overflow-x-auto overflow-y-auto custom-scrollbar flex-1 absolute inset-0 w-full">
                                        <table className="text-left text-sm table-fixed border-collapse" style={{ minWidth: totalTableWidth + 'px' }}>
                                            <thead className="bg-forge-900 sticky top-0 z-10 text-gray-400 shadow-md select-none">
                                                <tr>
                                                    {/* MULTI SELECT CHECKBOX HEADER */}
                                                    {isSelectionMode && (
                                                        <th style={{ width: '40px' }} className="p-1 sm:p-2 font-semibold text-center border-r border-forge-700 bg-forge-900/80">
                                                            <input 
                                                                type="checkbox" 
                                                                checked={sortedData.length > 0 && selectedIds.length === sortedData.length}
                                                                onChange={(e) => {
                                                                    if (e.target.checked) setSelectedIds(sortedData.map(d => d.id));
                                                                    else setSelectedIds([]);
                                                                }}
                                                                className="w-4 h-4 rounded accent-blue-500 bg-forge-900 border-forge-700 cursor-pointer"
                                                                title="Alle sichtbaren auswählen"
                                                            />
                                                        </th>
                                                    )}
                                                    
                                                    {/* DYNAMIC COLUMNS (DRAGGABLE & RESIZABLE) */}
                                                    {visibleColumns.map((col) => (
                                                        <th 
                                                            key={col.key}
                                                            style={{ width: col.width + 'px' }}
                                                            draggable="true"
                                                            onDragStart={(e) => {
                                                                e.dataTransfer.setData('colKey', col.key);
                                                                e.currentTarget.classList.add('dragging');
                                                            }}
                                                            onDragEnd={(e) => {
                                                                e.currentTarget.classList.remove('dragging');
                                                            }}
                                                            onDragOver={(e) => {
                                                                e.preventDefault();
                                                                e.currentTarget.classList.add('drag-over');
                                                            }}
                                                            onDragLeave={(e) => {
                                                                e.currentTarget.classList.remove('drag-over');
                                                            }}
                                                            onDrop={(e) => {
                                                                e.preventDefault();
                                                                e.currentTarget.classList.remove('drag-over');
                                                                const draggedKey = e.dataTransfer.getData('colKey');
                                                                // Prevent dropping tags onto column headers
                                                                if (!draggedKey || draggedKey === col.key || !columns.find(c => c.key === draggedKey)) return;
                                                                
                                                                setColumns(prev => {
                                                                    const newCols = [...prev];
                                                                    const draggedIdx = newCols.findIndex(c => c.key === draggedKey);
                                                                    const targetIdx = newCols.findIndex(c => c.key === col.key);
                                                                    const [draggedCol] = newCols.splice(draggedIdx, 1);
                                                                    newCols.splice(targetIdx, 0, draggedCol);
                                                                    return newCols;
                                                                });
                                                            }}
                                                            className={`relative p-1.5 sm:p-2 font-semibold text-xs sm:text-sm hover:text-white transition-colors border-b border-forge-700 bg-forge-900 hover:bg-forge-800 ${['tags', 'power_cost', 'manually_checked', 'type'].includes(col.key) ? 'border-l border-forge-700' : ''}`} 
                                                        >
                                                            <div 
                                                                className="flex items-center gap-1 cursor-grab overflow-hidden whitespace-nowrap"
                                                                onClick={() => handleSort(col.key)}
                                                                title="Klicken zum Sortieren, Ziehen zum Verschieben"
                                                            >
                                                                {col.label}
                                                                {sortConfig.key === col.key && <span className="text-forge-accent text-[10px]">{sortConfig.direction === 'asc' ? '▲' : '▼'}</span>}
                                                            </div>
                                                            <div 
                                                                className="col-resizer"
                                                                onMouseDown={(e) => handleResizeStart(e, col.key)}
                                                                title="Breite anpassen"
                                                            />
                                                        </th>
                                                    ))}
                                                    
                                                    <th style={{ width: '50px' }} className="p-1.5 sm:p-2 font-semibold text-xs sm:text-sm border-l border-b border-forge-700 text-center bg-forge-900">Del</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-forge-700">
                                                {sortedData.map((row) => {
                                                    const originalIndex = data.findIndex(d => d === row);
                                                    
                                                    const isChecked = String(row.manually_checked).toLowerCase() === 'true';
                                                    const isSelected = selectedIds.includes(row.id);
                                                    
                                                    return (
                                                        <tr key={originalIndex} className={`hover:bg-forge-700/50 transition-colors ${isChecked ? 'bg-forge-800/20' : ''} ${isSelected ? 'bg-blue-900/10' : ''}`}>
                                                            
                                                            {/* MULTI SELECT CHECKBOX */}
                                                            {isSelectionMode && (
                                                                <td className="p-1 text-center border-r border-forge-700 bg-forge-900/30 align-middle">
                                                                    <input 
                                                                        type="checkbox" 
                                                                        checked={isSelected}
                                                                        onChange={() => {
                                                                            if (isSelected) setSelectedIds(selectedIds.filter(id => id !== row.id));
                                                                            else setSelectedIds([...selectedIds, row.id]);
                                                                        }}
                                                                        className="w-4 h-4 rounded accent-blue-500 bg-forge-900 border-forge-700 cursor-pointer"
                                                                    />
                                                                </td>
                                                            )}
                                                            
                                                            {/* DYNAMIC DATA CELLS */}
                                                            {visibleColumns.map((col) => renderCell(col, row, originalIndex, isChecked, isSelected))}

                                                            <td className="p-1 border-l border-forge-700 text-center align-middle">
                                                                <button onClick={() => handleDeleteRow(originalIndex)} className="text-gray-500 hover:text-red-500 hover:bg-red-900/30 p-1 rounded transition-colors" title="Löschen"><IconTrash /></button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                        {sortedData.length === 0 && <div className="p-8 text-center text-gray-500 text-sm">Keine Einträge gefunden.</div>}
                                    </div>
                                </div>
                                <div className="bg-forge-900 p-2 text-[10px] sm:text-xs text-gray-500 text-center border border-t-0 border-forge-700 rounded-b-xl flex-shrink-0 w-full">
                                    <strong>Tipp:</strong> Halte eine <b>Spaltenüberschrift</b> am rechten Rand gedrückt, um die Breite zu ändern. Mittig ziehen ändert die Position. Halte einen <b>Tag</b> gedrückt und ziehe ihn, um ihn umzusortieren!
                                </div>
                            </div>
                        )}
                    </main>

                    {/* WIDE MODAL: Description, Editing & KI Side-by-Side */}
                    {infoModalItem && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-2 sm:p-4 animate-[fadeIn_0.2s_ease-in-out]">
                            <div className="bg-forge-800 border border-forge-700 rounded-xl p-4 sm:p-6 w-[99vw] max-w-[2400px] shadow-2xl relative flex flex-col h-[98vh] sm:h-[96vh]">
                                <button onClick={() => setInfoModalItem(null)} className="absolute top-3 right-3 sm:top-4 sm:right-4 text-gray-400 hover:text-white transition-colors p-2 z-10 bg-forge-800 rounded-full shadow-lg"><IconClose /></button>
                                
                                <div className="mb-4 pr-10 flex-shrink-0">
                                    <h2 className="text-xl sm:text-3xl font-bold text-forge-light leading-tight mb-2">
                                        <input 
                                            type="text" 
                                            value={infoModalItem.name || ''} 
                                            onChange={(e) => {
                                                const originalIndex = data.findIndex(d => d.id === infoModalItem.id);
                                                if (originalIndex !== -1) {
                                                    handleCellEdit(originalIndex, 'name', e.target.value);
                                                    setInfoModalItem({...infoModalItem, name: e.target.value});
                                                }
                                            }}
                                            className="bg-transparent border-b border-transparent hover:border-gray-500 focus:border-forge-accent focus:bg-forge-900 outline-none w-full" 
                                            placeholder="Name"
                                        />
                                    </h2>
                                    <div className="flex flex-wrap gap-2 items-center">
                                        <span className="px-2 py-1 bg-forge-900 border border-forge-700 rounded text-xs text-gray-400 font-mono">ID: {infoModalItem.id}</span>
                                        {String(infoModalItem.manually_checked).toLowerCase() === 'true' && (
                                            <span className="px-2 py-1 bg-emerald-900/40 border border-emerald-700 rounded text-xs text-emerald-300 font-bold flex items-center gap-1 shadow-[0_0_10px_rgba(16,185,129,0.2)]">
                                                <IconCheck/> Manuell geprüft
                                            </span>
                                        )}
                                        {infoModalItem.last_checked && (
                                            <span className="px-2 py-1 bg-blue-900/20 border border-blue-900/50 rounded text-xs text-blue-400 flex items-center gap-1">
                                                <IconSparkles /> KI-Check: {infoModalItem.last_checked}
                                            </span>
                                        )}
                                    </div>
                                </div>

                                {/* TWO COLUMN LAYOUT */}
                                <div className="flex flex-col lg:flex-row gap-4 lg:gap-6 h-full min-h-0">
                                    
                                    {/* COLUMN 1: Editor */}
                                    <div className="w-full lg:w-4/12 flex flex-col h-full min-h-0 overflow-y-auto custom-scrollbar pr-1 lg:pr-4 pb-4">
                                        <div className="space-y-4">
                                            
                                            {/* GROUP 1: Basis & Meta */}
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 bg-forge-900 p-3 rounded-lg border border-forge-700 shadow-inner">
                                                <div>
                                                    <label className="text-[10px] text-gray-500 block mb-1 font-bold uppercase flex items-center gap-1"><IconFilter /> Kategorie</label>
                                                    <input list="category-options" type="text" value={infoModalItem.category || ''} onChange={(e) => handleApplySuggestion('category', e.target.value)} className="w-full bg-forge-800 border border-forge-700 hover:border-gray-500 focus:border-forge-accent outline-none px-2 py-1.5 rounded text-xs text-emerald-400" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] text-gray-500 block mb-1 font-bold uppercase flex items-center gap-1"><IconBook /> Source</label>
                                                    <input type="text" value={infoModalItem.source || ''} onChange={(e) => handleApplySuggestion('source', e.target.value)} className="w-full bg-forge-800 border border-forge-700 outline-none px-2 py-1.5 rounded text-xs text-gray-200" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] text-gray-500 block mb-1 font-bold uppercase flex items-center gap-1"><IconMap /> Biome</label>
                                                    <input type="text" value={infoModalItem.scenes || ''} onChange={(e) => handleApplySuggestion('scenes', e.target.value)} className="w-full bg-forge-800 border border-forge-700 outline-none px-2 py-1.5 rounded text-xs text-gray-200" />
                                                </div>
                                            </div>

                                            {/* GROUP 2: Zuweisungen */}
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                <ModalPillField label="Type" icon={<IconShield />} value={infoModalItem.type} onChange={(e) => handleApplySuggestion('type', e.target.value)} categoryType="type" placeholder="Waffe, Rüstung..." />
                                                <ModalPillField label="Sub-Typ" icon={<IconTag />} value={infoModalItem.subType} onChange={(e) => handleApplySuggestion('subType', e.target.value)} categoryType="subtype" placeholder="Pike, Schwert, Schild..." />
                                                <ModalPillField label="Klassen" icon={<IconUser />} value={infoModalItem.klasse} onChange={(e) => handleApplySuggestion('klasse', e.target.value)} categoryType="klasse" placeholder="Kämpfer, Magier..." />
                                                <ModalPillField label="Völker" icon={<IconUsers />} value={infoModalItem.volk} onChange={(e) => handleApplySuggestion('volk', e.target.value)} categoryType="volk" placeholder="Elf, Zwerg..." />
                                            </div>

                                            {/* GROUP 3: Balancing */}
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="bg-forge-900 p-3 rounded-lg border border-forge-700 shadow-inner">
