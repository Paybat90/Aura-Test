                                                    <label className="text-[10px] text-blue-400 font-bold uppercase flex items-center gap-1.5 mb-2"><IconBolt /> Power Cost</label>
                                                    <input type="number" step="0.1" value={infoModalItem.power_cost !== null && infoModalItem.power_cost !== undefined ? infoModalItem.power_cost : ''} onChange={(e) => handleApplySuggestion('power_cost', e.target.value)} className="w-full bg-forge-800 border border-forge-700 outline-none px-2 py-1.5 rounded text-xs font-mono text-blue-300 font-bold spin-styled-blue" />
                                                </div>
                                                <div className="bg-forge-900 p-3 rounded-lg border border-forge-700 shadow-inner">
                                                    <label className="text-[10px] text-amber-500 font-bold uppercase flex items-center gap-1.5 mb-2"><IconCoins /> Wert (Gold)</label>
                                                    <input type="number" step="0.1" value={infoModalItem.wert !== null && infoModalItem.wert !== undefined ? infoModalItem.wert : ''} onChange={(e) => handleApplySuggestion('wert', e.target.value)} className="w-full bg-forge-800 border border-forge-700 outline-none px-2 py-1.5 rounded text-xs font-mono text-amber-500 spin-styled-amber" />
                                                </div>
                                                <div className="bg-forge-900 p-3 rounded-lg border border-forge-700 shadow-inner">
                                                    <label className="text-[10px] text-gray-400 font-bold uppercase flex items-center gap-1.5 mb-2"><IconScale /> Tradeoff?</label>
                                                    <select value={infoModalItem.is_tradeoff || 'false'} onChange={(e) => handleApplySuggestion('is_tradeoff', e.target.value)} className={`w-full bg-forge-800 border border-forge-700 outline-none px-2 py-1.5 rounded text-xs ${String(infoModalItem.is_tradeoff).toLowerCase() === 'true' ? 'text-red-400' : 'text-gray-200'}`}>
                                                        <option value="true">True</option><option value="false">False</option>
                                                    </select>
                                                </div>
                                                <div className="bg-forge-900 p-3 rounded-lg border border-forge-700 shadow-inner">
                                                    <label className="text-[10px] text-purple-400 font-bold uppercase flex items-center gap-1.5 mb-2"><IconLink /> Attunement Req</label>
                                                    <ModalPillField label="Attunement Req" icon={null} value={Array.isArray(infoModalItem.attunement_req) ? infoModalItem.attunement_req.join(', ') : infoModalItem.attunement_req} onChange={(e) => handleApplySuggestion('attunement_req', e.target.value.split(',').map(s=>s.trim()).filter(Boolean))} categoryType="all" placeholder="true, class_paladin..." />
                                                </div>
                                            </div>

                                            {/* GROUP 4: Tags */}
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                <ModalPillField label="Motivator" icon={<IconTarget />} value={infoModalItem.tags_motivator} onChange={(e) => handleApplySuggestion('tags_motivator', e.target.value)} categoryType="motivator" placeholder="kampf, taktik..." />
                                                <ModalPillField label="Zeit" icon={<IconClock />} value={infoModalItem.tags_zeitaufwand} onChange={(e) => handleApplySuggestion('tags_zeitaufwand', e.target.value)} categoryType="zeit" placeholder="aktion, passiv..." />
                                                <ModalPillField label="Thema" icon={<IconFlame />} value={infoModalItem.tags_thema} onChange={(e) => handleApplySuggestion('tags_thema', e.target.value)} categoryType="thema" placeholder="feuer, eis..." />
                                                <ModalPillField label="Allgemeine Tags" icon={<IconTag />} value={infoModalItem.tags} onChange={(e) => handleApplySuggestion('tags', e.target.value)} categoryType="all" placeholder="Weitere Tags..." />
                                            </div>

                                            {/* GROUP 5: Flavour & Progression */}
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                <div className="bg-forge-900 p-3 rounded-lg border border-forge-700 shadow-inner flex flex-col">
                                                    <label className="text-[10px] text-gray-400 font-bold uppercase flex items-center gap-1.5 mb-2"><IconSparkles /> Flavour Text</label>
                                                    <textarea 
                                                        value={infoModalItem.flavour_text || ''} 
                                                        onChange={(e) => handleApplySuggestion('flavour_text', e.target.value)} 
                                                        className="w-full bg-transparent border-b border-forge-700 hover:border-gray-500 focus:border-forge-accent outline-none text-xs text-gray-400 h-full resize-none custom-scrollbar p-1 italic flex-1" 
                                                        placeholder="Der Stahl leuchtet..."
                                                    />
                                                </div>
                                                <div className="flex flex-col gap-3">
                                                    <div className="bg-forge-900 p-2.5 rounded-lg border border-forge-700 shadow-inner">
                                                        <label className="text-[10px] text-cyan-400 font-bold uppercase flex items-center gap-1.5 mb-1"><IconLink /> Upgrade ID</label>
                                                        <input type="text" value={infoModalItem.upgrade_id || ''} onChange={(e) => handleApplySuggestion('upgrade_id', e.target.value)} className="w-full bg-transparent border-b border-forge-700 outline-none px-1 py-1 text-xs font-mono text-cyan-400" placeholder="s123" />
                                                    </div>
                                                    <div className="bg-forge-900 p-2.5 rounded-lg border border-forge-700 shadow-inner">
                                                        <label className="text-[10px] text-indigo-300 font-bold uppercase flex items-center gap-1.5 mb-1"><IconBook /> Awaken Riddle</label>
                                                        <input type="text" value={infoModalItem.awaken_riddle || ''} onChange={(e) => handleApplySuggestion('awaken_riddle', e.target.value)} className="w-full bg-transparent border-b border-forge-700 outline-none px-1 py-1 text-[10px] text-indigo-300" placeholder="Erwacht, wenn..." />
                                                    </div>
                                                    <div className="bg-forge-900 p-2.5 rounded-lg border border-forge-700 shadow-inner">
                                                        <label className="text-[10px] text-emerald-400 font-bold uppercase flex items-center gap-1.5 mb-1"><IconTarget /> Awaken Clear</label>
                                                        <input type="text" value={infoModalItem.awaken_clear || ''} onChange={(e) => handleApplySuggestion('awaken_clear', e.target.value)} className="w-full bg-transparent border-b border-forge-700 outline-none px-1 py-1 text-[10px] text-emerald-400" placeholder="Klartext-Bedingung..." />
                                                    </div>
                                                </div>
                                            </div>

                                            {/* GROUP 6: Textarea & Controls */}
                                            <div>
                                                <label className="text-[10px] text-gray-400 font-bold uppercase flex items-center gap-1.5 mb-2"><IconBook /> Beschreibung (Generator-Text)</label>
                                                <textarea
                                                    value={infoModalItem.desc || ''}
                                                    onChange={(e) => handleApplySuggestion('desc', e.target.value)}
                                                    className="w-full h-32 sm:h-40 bg-forge-900 border border-forge-700 rounded-lg p-3 text-sm focus:outline-none focus:border-forge-accent text-gray-300 resize-none custom-scrollbar shadow-inner leading-relaxed"
                                                />
                                            </div>

                                            <div className="flex items-center justify-between bg-forge-900 p-3 rounded-lg border border-forge-700 mt-4">
                                                <div className="flex items-center gap-2">
                                                    <label className="text-sm text-gray-400">Aktiviert im Generator?</label>
                                                    <select value={infoModalItem.enabled || 'true'} onChange={(e) => handleApplySuggestion('enabled', e.target.value)} className="bg-forge-800 border border-forge-700 outline-none px-2 py-1 rounded text-xs">
                                                        <option value="true">True</option><option value="false">False</option>
                                                    </select>
                                                </div>
                                                <label className="flex items-center gap-2 cursor-pointer bg-emerald-900/30 px-3 py-1.5 rounded border border-emerald-800/50 hover:bg-emerald-900/50 transition-colors">
                                                    <input 
                                                        type="checkbox" 
                                                        checked={String(infoModalItem.manually_checked).toLowerCase() === 'true'} 
                                                        onChange={(e) => handleApplySuggestion('manually_checked', e.target.checked)}
                                                        className="w-4 h-4 rounded accent-emerald-500 bg-forge-900 border-forge-700 cursor-pointer"
                                                    />
                                                    <span className="text-emerald-400 text-sm font-bold select-none">Manuell geprüft</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    {/* COLUMN 2: KI Panel */}
                                    <div className="w-full lg:w-8/12 flex flex-col h-full min-h-0 overflow-y-auto custom-scrollbar border-t lg:border-t-0 lg:border-l border-forge-700 lg:pl-6 pt-4 lg:pt-0">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-lg font-bold text-blue-400 flex items-center gap-2">
                                                {apiProvider === 'gemini' ? <IconSparkles /> : <IconBrain />} 
                                                KI-Assistent ({apiProvider === 'gemini' ? 'Gemini' : 'OpenAI'})
                                            </h3>
                                            <button onClick={handleSingleAnalysis} disabled={isAnalyzing} className={`hover:bg-blue-500 disabled:opacity-50 text-white font-semibold py-1.5 px-4 rounded transition-all shadow text-xs sm:text-sm flex items-center gap-2 ${apiProvider === 'openai' ? 'bg-emerald-600 hover:bg-emerald-500 hover:glow-ai-openai' : 'bg-blue-600 hover:bg-blue-500 hover:glow-ai'}`}>
                                                {isAnalyzing ? <div className="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : (apiProvider === 'gemini' ? <IconSparkles /> : <IconBrain />)}
                                                {isAnalyzing ? 'Analysiert...' : 'Analysieren'}
                                            </button>
                                        </div>

                                        {aiError && (
                                            <div className="bg-red-900/30 border border-red-900/50 p-3 rounded mb-4 text-red-400 text-sm">
                                                {aiError}
                                            </div>
                                        )}

                                        {!aiFeedback && !isAnalyzing && !aiError && (
                                            <div className="flex-1 flex flex-col items-center justify-center text-center p-6 bg-forge-900/50 rounded-xl border border-forge-700 border-dashed">
                                                {apiProvider === 'gemini' ? <IconSparkles /> : <IconBrain />}
                                                <p className="text-gray-400 text-sm mt-3 max-w-sm">Klicke auf "Analysieren", um das Balancing, die Action Economy und die Tags durch die KI überprüfen zu lassen. Vorschläge können mit einem Klick übernommen werden.</p>
                                            </div>
                                        )}

                                        {aiFeedback && (
                                            <div className="flex flex-col xl:flex-row gap-4 animate-[fadeIn_0.3s_ease-in-out] pb-4 flex-1 min-h-0">
                                                
                                                {/* KI Analyse Bericht */}
                                                <div className="flex-1 bg-forge-900 p-5 rounded-xl border border-forge-700 overflow-y-auto custom-scrollbar shadow-inner">
                                                    <h4 className="text-sm font-bold text-blue-400 mb-6 border-b border-forge-700 pb-2">KI-Analyse-Bericht:</h4>
                                                    
                                                    {aiFeedback.bewertungen ? (
                                                        <div className="flex flex-col gap-5">
                                                            {aiFeedback.bewertungen.map((bewertung, idx) => {
                                                                const isOk = bewertung.status === 'ok';
                                                                return (
                                                                    <div key={idx} className={`p-4 rounded-xl border ${isOk ? 'bg-emerald-900/10 border-emerald-900/30' : 'bg-red-900/10 border-red-900/30'} flex flex-col gap-3 transition-colors`}>
                                                                        <div className="flex items-center gap-2">
                                                                            {isOk ? <IconCheck /> : <IconAlert />}
                                                                            <h5 className={`font-bold text-lg ${isOk ? 'text-emerald-400' : 'text-red-400'}`}>
                                                                                {bewertung.kategorie}
                                                                            </h5>
                                                                        </div>
                                                                        <p className="text-gray-300 text-base leading-relaxed">{bewertung.text}</p>
                                                                        
                                                                        {bewertung.punkte && bewertung.punkte.length > 0 && (
                                                                            <ul className="list-disc pl-6 text-gray-400 space-y-1.5 mt-1 text-sm sm:text-base marker:text-forge-600">
                                                                                {bewertung.punkte.map((punkt, i) => (
                                                                                    <li key={i} className="pl-1">{punkt}</li>
                                                                                ))}
                                                                            </ul>
                                                                        )}
                                                                    </div>
                                                                );
                                                            })}

                                                            {aiFeedback.fazit && (
                                                                <div className="mt-2 p-5 bg-blue-900/20 border border-blue-800/50 rounded-xl shadow-md">
                                                                    <h5 className="font-bold text-blue-400 mb-3 text-lg flex items-center gap-2">
                                                                        <IconSparkles /> Fazit & Empfehlung
                                                                    </h5>
                                                                    <p className="text-blue-100 text-base leading-relaxed italic">
                                                                        "{aiFeedback.fazit}"
                                                                    </p>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ) : (
                                                        <div className="text-base text-gray-300 leading-relaxed whitespace-pre-wrap font-sans">
                                                            {aiFeedback.analyse_text || "Kein Analyse-Text vorhanden."}
                                                        </div>
                                                    )}
                                                </div>

                                                {/* Parsing der Vorschläge */}
                                                <div className="w-full xl:w-64 flex-shrink-0 bg-blue-950/40 border border-blue-500/30 rounded-xl p-4 shadow-lg overflow-y-auto custom-scrollbar">
                                                    <h4 className="text-sm font-bold text-blue-300 mb-3 border-b border-blue-900/50 pb-2">Schnell-Übernahme:</h4>
                                                    <div className="flex flex-col gap-1">
                                                        {renderSuggestionButton('name', aiFeedback.name, 'Name')}
                                                        {renderSuggestionButton('power_cost', aiFeedback.power_cost, 'Power Cost')}
                                                        {renderSuggestionButton('wert', aiFeedback.wert, 'Wert')}
                                                        {renderSuggestionButton('type', aiFeedback.type, 'Zuweisung (Type)')}
                                                        {renderSuggestionButton('subType', aiFeedback.subType, 'Sub-Typ')}
                                                        {renderSuggestionButton('klasse', aiFeedback.klasse, 'Klasse')}
                                                        {renderSuggestionButton('volk', aiFeedback.volk, 'Volk')}
                                                        {renderSuggestionButton('attunement_req', aiFeedback.attunement_req, 'Attunement')}
                                                        {renderSuggestionButton('is_tradeoff', aiFeedback.is_tradeoff, 'Trade-off')}
                                                        {renderSuggestionButton('tags', aiFeedback.tags, 'Tags (Allg.)')}
                                                        {renderSuggestionButton('tags_motivator', aiFeedback.tags_motivator, 'Motivator')}
                                                        {renderSuggestionButton('tags_zeitaufwand', aiFeedback.tags_zeitaufwand, 'Zeit')}
                                                        {renderSuggestionButton('tags_thema', aiFeedback.tags_thema, 'Thema')}
                                                        {renderSuggestionButton('desc', aiFeedback.desc, 'Beschreibung')}
                                                        {renderSuggestionButton('flavour_text', aiFeedback.flavour_text, 'Flavour Text')}
                                                        {renderSuggestionButton('upgrade_id', aiFeedback.upgrade_id, 'Upgrade ID')}
                                                        {renderSuggestionButton('awaken_riddle', aiFeedback.awaken_riddle, 'Awaken Riddle')}
                                                        {renderSuggestionButton('awaken_clear', aiFeedback.awaken_clear, 'Awaken Clear')}
                                                        
                                                        {Object.keys(aiFeedback).filter(k => k !== 'analyse_text' && k !== 'bewertungen' && k !== 'fazit' && k !== 'gedankengang').every(k => aiFeedback[k] === null || aiFeedback[k] === undefined) && (
                                                            <span className="text-xs text-gray-500 italic mt-2">Die KI hat keine direkten Feldänderungen vorgeschlagen. Alles sieht super aus!</span>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* PROMPT EDITOR MODAL */}
                    {showPromptModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[250] p-4 animate-[fadeIn_0.2s_ease-in-out]">
                            <div className="bg-forge-800 border border-forge-700 rounded-xl p-4 sm:p-6 w-[98vw] max-w-4xl shadow-2xl relative flex flex-col h-[80vh]">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-xl font-bold text-forge-accent flex items-center gap-2">
                                        <IconMessageSquare /> KI-Prompt anpassen
                                    </h3>
                                    <button onClick={() => setShowPromptModal(false)} className="text-gray-400 hover:text-white transition-colors p-1"><IconClose /></button>
                                </div>
                                <p className="text-sm text-gray-400 mb-4 pb-4 border-b border-forge-700">
                                    Bearbeite die Systemanweisungen für die KI. Passe Regeln, Kontext und Anforderungen nach Belieben an. <br />
                                    <span className="text-red-400 font-bold mt-1 inline-block">WICHTIG: Das JSON-Strukturschema am Ende darf nicht kaputt gemacht werden, da sonst das Skript die Ergebnisse nicht mehr verarbeiten kann!</span>
                                </p>

                                <textarea
                                    value={tempPrompt}
                                    onChange={(e) => setTempPrompt(e.target.value)}
                                    className="flex-1 bg-forge-900 border border-forge-700 rounded-lg p-4 text-sm focus:outline-none focus:border-forge-accent text-gray-300 resize-none custom-scrollbar shadow-inner mb-4 font-mono leading-relaxed"
                                    placeholder="Dein System-Prompt..."
                                />

                                <div className="flex justify-between items-center pt-4 border-t border-forge-700">
                                    <button 
                                        onClick={() => setTempPrompt(DEFAULT_AI_PROMPT)} 
                                        className="px-4 py-2 rounded-lg text-sm font-medium text-amber-500 hover:text-white hover:bg-amber-900/50 border border-amber-900/50 transition-colors"
                                    >
                                        Standard wiederherstellen
                                    </button>
                                    <div className="flex gap-3">
                                        <button onClick={() => setShowPromptModal(false)} className="px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-forge-700 transition-colors">Abbrechen</button>
                                        <button 
                                            onClick={() => {
                                                setSystemPrompt(tempPrompt);
                                                setShowPromptModal(false);
                                                setGlobalSuccess("KI-System-Prompt erfolgreich gespeichert!");
                                            }} 
                                            className="flex items-center gap-2 bg-forge-accent hover:bg-amber-500 text-forge-900 px-6 py-2.5 rounded-lg text-sm font-bold transition-colors shadow-lg"
                                        >
                                            <IconCheck /> Speichern
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
